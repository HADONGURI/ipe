<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IPE 국제정치경제론 — 전체 학습 자료</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --m:#0d9488;--ml:rgba(13,148,136,.12);--mlb:#ccfbf1;--md:#0a6660;
  --l:#2563eb;--ll:rgba(37,99,235,.12);--llb:#dbeafe;--ld:#1e40af;
  --s:#7c3aed;--sl:rgba(124,58,237,.12);--slb:#ede9fe;--sd:#5b21b6;
  --bg:#0f0f0f;--bg2:#151515;--bg3:#1c1c1c;--bg4:#242424;
  --border:#262626;--border2:#323232;
  --text:#e0d9d0;--text2:#8a8278;--text3:#4e4944;
  --accent:#c9963a;
  --sans:'Noto Sans KR',sans-serif;
  --serif:'Noto Serif KR',serif;
  --mono:'Space Mono',monospace;
  --r:8px;--rl:12px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13.5px;line-height:1.75;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
h2{font-family:var(--serif);font-weight:400;font-size:1.5rem;line-height:1.35}
h3{font-family:var(--serif);font-weight:400;font-size:1.05rem}
h4{font-family:var(--sans);font-weight:500;font-size:.9rem}
p{color:var(--text2);line-height:1.85;margin-bottom:.85rem}
p:last-child{margin-bottom:0}
strong,b{color:var(--text);font-weight:500}
em{font-style:italic}
ul,ol{color:var(--text2);padding-left:1.4rem;margin-bottom:.75rem}
li{margin-bottom:.3rem;line-height:1.75}
li strong{color:var(--text)}
@keyframes fadeup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadein{from{opacity:0}to{opacity:1}}

/* ─── HEADER ─── */
.hdr{position:sticky;top:0;z-index:300;background:rgba(15,15,15,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:.65rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.logo{font-family:var(--mono);font-size:.75rem;color:var(--accent);letter-spacing:.1em;flex-shrink:0}
.nav{display:flex;gap:.35rem;flex-wrap:wrap}
.nbtn{padding:.28rem .75rem;border-radius:14px;font-size:.73rem;border:1px solid var(--border2);cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;white-space:nowrap}
.nbtn:hover{border-color:var(--accent);color:var(--accent)}

/* ─── TIMELINE ─── */
#tl-sec{border-bottom:1px solid var(--border);background:var(--bg2)}
.tl-hd{padding:.6rem 1.5rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.tl-lbl{font-family:var(--mono);font-size:.65rem;color:var(--text3);letter-spacing:.13em;text-transform:uppercase}
.tl-leg{display:flex;gap:.9rem;margin-left:auto}
.tl-leg span{display:flex;align-items:center;gap:.3rem;font-size:.68rem;color:var(--text3)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}

.tl-scroll{overflow-x:auto;padding:1rem 1.5rem;display:flex;align-items:flex-start;gap:0;min-height:90px}
.tl-ev{display:flex;flex-direction:column;align-items:center;gap:.32rem;cursor:pointer;flex-shrink:0;width:86px;transition:transform .18s;padding-bottom:.4rem}
.tl-ev:hover{transform:translateY(-3px)}
.tl-yr{font-family:var(--mono);font-size:.6rem;color:var(--text3);text-align:center;line-height:1.2}
.tl-nd{width:10px;height:10px;border-radius:50%;border:2px solid var(--border2);background:var(--bg);transition:all .2s;flex-shrink:0}
.tl-nd.nm{border-color:var(--m)}.tl-nd.nl{border-color:var(--l)}.tl-nd.ns{border-color:var(--s)}
.tl-ev.act .tl-nd.nm,.tl-ev:hover .tl-nd.nm{background:var(--m);box-shadow:0 0 9px var(--m)}
.tl-ev.act .tl-nd.nl,.tl-ev:hover .tl-nd.nl{background:var(--l);box-shadow:0 0 9px var(--l)}
.tl-ev.act .tl-nd.ns,.tl-ev:hover .tl-nd.ns{background:var(--s);box-shadow:0 0 9px var(--s)}
.tl-nm{font-size:.65rem;color:var(--text2);text-align:center;line-height:1.3;max-width:78px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.tl-cn{width:26px;height:1px;background:var(--border);flex-shrink:0;margin-top:42px;align-self:flex-start}

#tl-det{display:none;border-top:1px solid var(--border);background:var(--bg3);max-height:75vh;overflow-y:auto}
#tl-det.open{display:block;animation:fadeup .22s ease}
.tl-di{padding:1.5rem 1.8rem;max-width:1050px}
.tl-dt{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.1rem}
.tl-dg{display:grid;grid-template-columns:1fr 1fr;gap:1.6rem}
@media(max-width:720px){.tl-dg{grid-template-columns:1fr}}

/* ─── LAYOUT ─── */
.layout{display:flex;min-height:calc(100vh - 42px)}
.sb{width:252px;min-width:252px;border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:42px;height:calc(100vh - 42px);overflow-y:auto;padding:1.1rem}
.main{flex:1;padding:1.8rem 2rem;overflow:hidden;min-width:0}

/* sidebar */
.sb-lbl{font-family:var(--mono);font-size:.62rem;color:var(--text3);letter-spacing:.13em;text-transform:uppercase;margin-bottom:.65rem}
.sb-th{display:flex;flex-direction:column;gap:.38rem;margin-bottom:1.3rem}
.tbtn{padding:.8rem 1rem;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;transition:all .18s;background:transparent;text-align:left}
.tbtn:hover{background:var(--bg3)}
.tbtn.am{border-color:var(--m);background:var(--ml)}.tbtn.al{border-color:var(--l);background:var(--ll)}.tbtn.as{border-color:var(--s);background:var(--sl)}
.tbn{font-size:.88rem;font-weight:500;margin-bottom:.12rem}
.tbe{font-family:var(--mono);font-size:.64rem;color:var(--text3)}
.tbs{font-size:.65rem;color:var(--text3);margin-top:.22rem}
.sdiv{height:1px;background:var(--border);margin:1rem 0}

/* supplementary nav */
.sup-nav{display:flex;flex-direction:column;gap:.3rem}
.sup-btn{padding:.5rem .8rem;border-radius:var(--r);font-size:.75rem;cursor:pointer;background:transparent;border:1px solid var(--border);color:var(--text2);text-align:left;transition:all .15s}
.sup-btn:hover{background:var(--bg3);color:var(--text)}
.sup-btn.active{background:var(--bg3);border-color:var(--border2);color:var(--text)}

/* content tabs */
.ctabs{display:flex;gap:.2rem;margin-bottom:1.6rem;border-bottom:1px solid var(--border);padding-bottom:.4rem;flex-wrap:wrap}
.ctab{padding:.32rem .85rem;font-size:.76rem;cursor:pointer;border-radius:var(--r) var(--r) 0 0;color:var(--text3);transition:all .14s;background:transparent;border:none;white-space:nowrap}
.ctab:hover{color:var(--text2)}
.ctab.active{color:var(--text);border-bottom:2px solid var(--accent)}
.cpane{display:none}.cpane.active{display:block;animation:fadein .2s ease}

/* theory hero */
.t-hero{padding:1.3rem 1.5rem;border-radius:var(--rl);border:1px solid var(--border);margin-bottom:1.8rem}
.th-lbl{font-family:var(--mono);font-size:.65rem;letter-spacing:.13em;text-transform:uppercase;margin-bottom:.45rem}
.th-title{font-size:1.8rem;font-family:var(--serif);font-weight:400;margin-bottom:.3rem}
.th-q{font-size:.93rem;color:var(--text2);font-style:italic;margin-bottom:.55rem}
.th-s{font-size:.7rem;color:var(--text3);font-family:var(--mono)}
.hm{border-color:var(--m);background:linear-gradient(135deg,var(--ml),transparent)}
.hl{border-color:var(--l);background:linear-gradient(135deg,var(--ll),transparent)}
.hs{border-color:var(--s);background:linear-gradient(135deg,var(--sl),transparent)}
.cm{color:var(--m)}.cl{color:var(--l)}.cs{color:var(--s)}

/* rich content */
.rc h3{font-size:.88rem;color:var(--accent);margin-top:1.5rem;margin-bottom:.45rem;font-family:var(--sans);font-weight:500}
.rc h3:first-child{margin-top:0}
.rc p{font-size:.85rem}
.rc ul{font-size:.84rem}

/* subtheory */
.sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.75rem}
.sub-card{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .18s}
.sub-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.sub-hd{padding:.65rem 1rem;font-size:.82rem;font-weight:500;display:flex;align-items:center;justify-content:space-between}
.sub-ar{font-size:.66rem;color:var(--text3);transition:transform .2s}
.sub-card.open .sub-ar{transform:rotate(180deg)}
.sub-bd{display:none;padding:.85rem 1rem;background:var(--bg3);border-top:1px solid var(--border);font-size:.82rem;color:var(--text2);line-height:1.8}
.sub-card.open .sub-bd{display:block}
.sm .sub-hd{background:var(--ml);color:var(--mlb)}.sl2 .sub-hd{background:var(--ll);color:var(--llb)}.ss .sub-hd{background:var(--sl);color:var(--slb)}

/* case grid */
.case-sec{margin-top:2.2rem}
.case-lbl{font-family:var(--mono);font-size:.64rem;color:var(--text3);letter-spacing:.13em;text-transform:uppercase;margin-bottom:.85rem}
.c-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.65rem}
.cc{border:1px solid var(--border);border-radius:var(--r);padding:.85rem;cursor:pointer;transition:all .18s;background:var(--bg3)}
.cc:hover{background:var(--bg4);border-color:var(--border2)}
.cc.selm{border-color:var(--m)}.cc.sell{border-color:var(--l)}.cc.sels{border-color:var(--s)}
.cc-loc{font-size:.64rem;font-family:var(--mono);color:var(--text3);margin-bottom:.28rem}
.cc-t{font-size:.82rem;font-weight:500;color:var(--text);margin-bottom:.28rem;line-height:1.35}
.cc-s{font-size:.74rem;color:var(--text3);line-height:1.45}

/* case detail */
.cd{display:none;margin-top:.75rem;border:1px solid var(--border2);border-radius:var(--rl);overflow:hidden}
.cd.open{display:block;animation:fadein .22s ease}
.cd-hd{padding:1rem 1.3rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.cd-cl{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.78rem;transition:all .14s}
.cd-cl:hover{background:var(--bg4);color:var(--text)}
.cd-title{font-size:1.05rem;font-family:var(--serif);font-weight:400}
.cd-meta{font-size:.68rem;font-family:var(--mono);color:var(--text3);margin-top:.18rem}
.cd-tabs{display:flex;gap:.2rem;border-bottom:1px solid var(--border);padding:0 1.3rem}
.cd-tab{padding:.32rem .8rem;font-size:.74rem;cursor:pointer;border-radius:var(--r) var(--r) 0 0;color:var(--text3);transition:all .14s;background:transparent;border:none}
.cd-tab:hover{color:var(--text2)}
.cd-tab.active{color:var(--text)}
.cd-tab.act-m{border-bottom:2px solid var(--m)}.cd-tab.act-l{border-bottom:2px solid var(--l)}.cd-tab.act-s{border-bottom:2px solid var(--s)}
.cd-body{padding:1.1rem 1.3rem}
.cd-pane{display:none}.cd-pane.active{display:block}

/* shared UI */
.pa{border-radius:var(--r);padding:.85rem 1.05rem;margin-bottom:.9rem;font-size:.83rem;line-height:1.8}
.pa-lbl{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.38rem;font-weight:700}
.pam{background:var(--ml);border-left:3px solid var(--m);color:var(--mlb)}.pam .pa-lbl{color:var(--m)}
.pal{background:var(--ll);border-left:3px solid var(--l);color:var(--llb)}.pal .pa-lbl{color:var(--l)}
.pas{background:var(--sl);border-left:3px solid var(--s);color:var(--slb)}.pas .pa-lbl{color:var(--s)}

.cr-pair{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.75rem}
@media(max-width:680px){.cr-pair{grid-template-columns:1fr}}
.cr-box{border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cr-hd{padding:.52rem .85rem;font-size:.7rem;font-weight:500;font-family:var(--mono)}
.cr-bd{padding:.8rem .85rem;font-size:.81rem;color:var(--text2);line-height:1.8}
.cr-bd strong{color:var(--text)}
.crm .cr-hd{background:var(--ml);color:var(--mlb)}.crl .cr-hd{background:var(--ll);color:var(--llb)}.crs .cr-hd{background:var(--sl);color:var(--slb)}

.bdg{display:inline-block;padding:.16rem .52rem;border-radius:4px;font-size:.66rem;font-weight:500;font-family:var(--mono);border:1px solid}
.bm{background:var(--ml);color:var(--m);border-color:var(--m)}
.bl{background:var(--ll);color:#5b9cf6;border-color:#5b9cf6}
.bs{background:var(--sl);color:#a78ee8;border-color:#a78ee8}
.ba{background:rgba(201,150,58,.1);color:var(--accent);border-color:var(--accent)}

.div{height:1px;background:var(--border);margin:1.2rem 0}
.slbl{font-family:var(--mono);font-size:.64rem;color:var(--text3);letter-spacing:.13em;text-transform:uppercase;margin-bottom:.55rem}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px;color:var(--text3);gap:.4rem;text-align:center}
.ei{font-size:2rem;opacity:.2}

/* supplement sections */
.sup-sec{margin-bottom:1.8rem}
.sup-sec h3{font-size:.9rem;color:var(--accent);margin-bottom:.5rem;font-weight:500;padding-bottom:.35rem;border-bottom:1px solid var(--border)}
.sup-sec p{font-size:.84rem}
.sup-sec ul{font-size:.83rem}

@media(max-width:860px){.layout{flex-direction:column}.sb{width:100%;min-width:unset;position:static;height:auto;border-right:none;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">IPE.STUDY</div>
  <nav class="nav">
    <button class="nbtn" onclick="scrollTo('tl-sec')">📅 연대기 타임라인</button>
    <button class="nbtn" onclick="scrollTo('main-sec')">📚 3대 이론</button>
    <button class="nbtn" onclick="selectT('mercantilism')">중상주의</button>
    <button class="nbtn" onclick="selectT('liberalism')">경제적 자유주의</button>
    <button class="nbtn" onclick="selectT('structuralism')">구조주의</button>
    <button class="nbtn" onclick="showSup('ipe101')">IPE란?</button>
    <button class="nbtn" onclick="showSup('debtCrisis')">부채위기</button>
    <button class="nbtn" onclick="showSup('tradeStructure')">무역구조</button>
    <button class="nbtn" onclick="showSup('moneyFinance')">화폐·금융</button>
    <button class="nbtn" onclick="showSup('tnc')">TNC·FDI</button>
    <button class="nbtn" onclick="showSup('postNeo')">포스트신자유주의</button>
  </nav>
</header>

<!-- TIMELINE -->
<section id="tl-sec">
  <div class="tl-hd">
    <span class="tl-lbl">연대기 타임라인 — 리딩자료 전체 사례</span>
    <span style="font-size:.72rem;color:var(--text3)">클릭 → 상세 내용 + 이론 간 비판</span>
    <div class="tl-leg">
      <span><span class="dot" style="background:var(--m)"></span>중상주의</span>
      <span><span class="dot" style="background:var(--l)"></span>자유주의</span>
      <span><span class="dot" style="background:var(--s)"></span>구조주의</span>
    </div>
  </div>
  <div class="tl-scroll" id="tl-scroll"></div>
  <div id="tl-det"></div>
</section>

<!-- MAIN -->
<div class="layout">
  <aside class="sb">
    <div class="sb-lbl">IPE 3대 이론</div>
    <div class="sb-th" id="sb-th"></div>
    <div class="sdiv"></div>
    <div class="sb-lbl">심화 주제</div>
    <div class="sup-nav">
      <button class="sup-btn" id="sup-ipe101" onclick="showSup('ipe101')">📖 IPE란 무엇인가 (Ch.1)</button>
      <button class="sup-btn" id="sup-debtCrisis" onclick="showSup('debtCrisis')">💸 부채·금융위기 (Ch.8)</button>
      <button class="sup-btn" id="sup-tradeStructure" onclick="showSup('tradeStructure')">🌐 무역구조 (Ch.6)</button>
      <button class="sup-btn" id="sup-moneyFinance" onclick="showSup('moneyFinance')">💱 화폐·금융 (Ch.7 + Top Dollar)</button>
      <button class="sup-btn" id="sup-tnc" onclick="showSup('tnc')">🏢 TNC·FDI (Ch.17)</button>
      <button class="sup-btn" id="sup-postNeo" onclick="showSup('postNeo')">🔄 포스트 신자유주의 (5주차 2강)</button>
    </div>
    <div class="sdiv"></div>
    <p style="font-size:.72rem;color:var(--text3);line-height:1.65">이론 선택 → 역사적 발전·핵심 내용·하위 이론·관련 사례 순서로 확인하세요.</p>
    <div class="sdiv"></div>
    <p style="font-size:.67rem;color:var(--text3);font-family:var(--mono);line-height:1.6">출처: Balaam &amp; Dillman<br>Introduction to IPE (5th Ed.)<br>+ FA 리딩자료 2~7주차</p>
  </aside>

  <main class="main" id="main-sec">
    <div id="theory-content">
      <div class="empty"><div class="ei">◎</div><div style="font-size:.88rem">왼쪽에서 이론 또는 주제를 선택하세요</div><div style="font-size:.74rem;color:var(--text3);margin-top:.2rem">중상주의 · 경제적 자유주의 · 구조주의 · 심화 주제</div></div>
    </div>
  </main>
</div>

<script>
// ============================================================
// IPE 국제정치경제론 학습 데이터
// 모든 리딩자료 기반 (2주차~7주차 2강)
// ============================================================

const IPE_DATA = {

  // ============================================================
  // 3대 이론 데이터
  // ============================================================
  theories: {
    mercantilism: {
      id: 'mercantilism',
      name: '중상주의',
      nameEn: 'Mercantilism',
      color: '#0d9488',
      colorLight: '#ccfbf1',
      colorDark: '#134e4a',
      source: '교재 Ch.3 (3주차 1강)',
      tagline: '국가가 경제를 설계하고 부와 권력을 극대화한다',
      history: `
        <h3>역사적 기원 (15~18세기): 유럽 절대왕정 시대</h3>
        <p>중상주의는 15세기부터 18세기까지 유럽을 지배한 경제 사상이자 정책 체계입니다. 당시 유럽의 절대왕정 국가들은 금과 은(귀금속)의 축적이 곧 국력이라고 믿었습니다. 스페인이 아메리카 대륙에서 막대한 금은을 약탈하는 것을 목격한 영국, 프랑스, 네덜란드 등은 귀금속을 확보하기 위해 수출을 극대화하고 수입을 최소화하려 했습니다.</p>
        <p>이 시기 국가들은 수출 보조금, 수입 관세, 무역 독점권 부여, 해외 식민지 건설 등을 적극적으로 활용했습니다. 영국의 동인도회사(1600년 설립)처럼 국가가 특정 기업에게 무역 독점권을 부여하는 방식이 전형적이었습니다.</p>

        <h3>고전 중상주의의 이론적 전개</h3>

<script>
// ── STATE ──
let activeT = null, activeTL = null, activeCase = null, activeSup = null;

function scrollTo(id){ document.getElementById(id)?.scrollIntoView({behavior:'smooth'}) }

// ════════ TIMELINE ════════
function buildTL(){
  const sc = document.getElementById('tl-scroll');
  const sorted=[...IPE_DATA.timeline].sort((a,b)=>a.yearNum-b.yearNum);
  sorted.forEach((ev,i)=>{
    const tc = ev.primaryTheory==='mercantilism'?'m':ev.primaryTheory==='liberalism'?'l':'s';
    const wrap = document.createElement('div');
    wrap.style.cssText='display:flex;align-items:flex-start';
    const el = document.createElement('div');
    el.className='tl-ev';
    el.dataset.id=ev.id;
    el.innerHTML=`<div class="tl-yr">${ev.year}</div><div class="tl-nd n${tc}"></div><div class="tl-nm">${ev.title}</div>`;
    el.onclick=()=>toggleTL(ev.id,el);
    wrap.appendChild(el);
    if(i<sorted.length-1){
      const cn=document.createElement('div');cn.className='tl-cn';wrap.appendChild(cn);
    }
    sc.appendChild(wrap);
  });
}

function toggleTL(id,el){

  }
  document.querySelectorAll('.tl-ev').forEach(e=>e.classList.remove('act'));
  el.classList.add('act');activeTL=id;
  const ev=IPE_DATA.timeline.find(t=>t.id===id);
  if(!ev)return;
  const tc=ev.primaryTheory==='mercantilism'?'m':ev.primaryTheory==='liberalism'?'l':'s';
  const tname=ev.primaryTheory==='mercantilism'?'중상주의':ev.primaryTheory==='liberalism'?'경제적 자유주의':'구조주의';
  const d=ev.detail;
  const crits=Object.values(d.critiques||{});

  det.innerHTML=`<div class="tl-di">
    <div class="tl-dt">
      <div>
        <span class="bdg b${tc}">${tname} 관점</span>
        <span class="bdg ba" style="margin-left:.4rem">${ev.tag}</span>
        <h2 style="margin-top:.5rem;font-size:1.08rem">${ev.title}</h2>
        <div style="font-size:.68rem;font-family:var(--mono);color:var(--text3);margin-top:.2rem">${ev.year} · ${ev.location}</div>

      <button onclick="closeTL()" style="padding:.28rem .75rem;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:.73rem;white-space:nowrap">닫기 ✕</button>

    <div class="tl-dg">
      <div>
        <div class="slbl">역사적 배경</div>
        <p style="font-size:.83rem;color:var(--text2);line-height:1.85;margin-bottom:1rem">${d.background}</p>
        <div class="div"></div>
        <div class="slbl">세부 내용</div>
        <p style="font-size:.83rem;color:var(--text2);line-height:1.85;white-space:pre-line">${d.content}</p>
        <div class="div"></div>
        <div class="slbl">결과 및 의의</div>
        <p style="font-size:.83rem;color:var(--text2);line-height:1.85">${d.result}</p>
      </div>
      <div>
        <div class="pa pa${tc}">

  <div class="cpane" id="pane-s"><div class="sub-grid">${buildSubs(t.subTheories||t.subs,tc)}</div></div>
  <div class="cpane" id="pane-cases">
    <div class="case-sec">
      <div class="case-lbl">${t.name||t.label} 관점으로 분류된 사례 — 클릭하면 상세 내용과 이론 간 비판이 펼쳐집니다</div>
      <div class="c-grid">${tl.map(ev=>`
        <div class="cc" data-evid="${ev.id}" onclick="openCase('${ev.id}','${tc}')">
          <div class="cc-loc">${ev.location} · ${ev.year}</div>
          <div class="cc-t">${ev.title}</div>
          <div class="cc-s">${ev.detail.background.substring(0,75)}...</div>
        </div>`).join('')}
      </div>
      <div id="case-det" class="cd"></div>
    </div>
  </div>`;
}

function buildHistory(hist){
  if(!hist) return '<p>내용 없음</p>';
  if(typeof hist==='string') return hist;
  if(!hist.length) return '<p>내용 없음</p>';
  return hist.map(h=>`<h3>${h.t}</h3><div style="font-size:.85rem;color:var(--text2);line-height:1.85;margin-bottom:1rem">${h.c.replace(/\n/g,'<br>')}</div>`).join('');
}
function buildCore(core){
  if(!core) return '<p>내용 없음</p>';
  if(typeof core==='string') return core;
  if(!core.length) return '<p>내용 없음</p>';
  return core.map(h=>`<h3>${h.t}</h3><div style="font-size:.85rem;color:var(--text2);line-height:1.85;margin-bottom:1rem">${h.c.replace(/\n/g,'<br>')}</div>`).join('');
}
function buildSubs(subs,tc){
  if(!subs||!subs.length) return '<p>내용 없음</p>';
  const cls=tc==='m'?'sm':tc==='l'?'sl2':'ss';
  return subs.map(s=>`
    <div class="sub-card ${cls}" onclick="togSub(this)">
      <div class="sub-hd">${s.name||s.n}<span class="sub-ar">▼</span></div>
      <div class="sub-bd">${s.content||s.c}</div>
    </div>`).join('');
}
function togSub(card){
  const was=card.classList.contains('open');
  card.closest('.sub-grid').querySelectorAll('.sub-card.open').forEach(c=>c.classList.remove('open'));
  if(!was)card.classList.add('open');
}
function swTab(btn,paneId){
  btn.closest('.ctabs').querySelectorAll('.ctab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const parent=btn.closest('.main')||document.getElementById('theory-content');
  parent.querySelectorAll('.cpane').forEach(p=>p.classList.remove('active'));
  document.getElementById(paneId)?.classList.add('active');
}

// ════════ CASE DETAIL ════════
function openCase(evId, tc){
  if(activeCase===evId){closeCase();return;}
  activeCase=evId;
  document.querySelectorAll('.cc').forEach(c=>{c.classList.remove('selm','sell','sels')});
  document.querySelector(`.cc[data-evid="${evId}"]`)?.classList.add(`sel${tc}`);
  const ev=IPE_DATA.timeline.find(t=>t.id===evId);if(!ev)return;
  const d=ev.detail;
  const tname=ev.primaryTheory==='mercantilism'?'중상주의':ev.primaryTheory==='liberalism'?'경제적 자유주의':'구조주의';
  const crits=Object.values(d.critiques||{});

  const det=document.getElementById('case-det');
  det.innerHTML=`
    <div class="cd-hd" style="background:var(--${tc}l)">
      <div>
        <span class="bdg b${tc}">${tname}</span>
        <div class="cd-title" style="margin-top:.45rem">${ev.title}</div>
        <div class="cd-meta">${ev.year} · ${ev.location} · ${ev.tag}</div>
      </div>
      <button class="cd-cl" onclick="closeCase()">✕</button>
    </div>
    <div class="cd-tabs">
      <button class="cd-tab active act-${tc}" onclick="swCDTab(this,'cdp-ctx')">배경 &amp; 내용</button>
      <button class="cd-tab" onclick="swCDTab(this,'cdp-res')">결과 &amp; 의의</button>
      <button class="cd-tab" onclick="swCDTab(this,'cdp-crit')">이론 간 비판</button>
    </div>
    <div class="cd-body">
      <div class="cd-pane active" id="cdp-ctx">
        <div class="slbl">역사적 배경</div>
        <p style="font-size:.84rem;color:var(--text2);line-height:1.85;margin-bottom:.9rem">${d.background}</p>
        <div class="div"></div>
        <div class="slbl">세부 내용</div>
        <p style="font-size:.84rem;color:var(--text2);line-height:1.85;white-space:pre-line">${d.content}</p>
      </div>
      <div class="cd-pane" id="cdp-res">
        <div class="pa pa${tc}" style="margin-bottom:1rem">
          <div class="pa-lbl">${tname} 관점으로 분류된 이유</div>
          <div style="font-size:.83rem">${getPrimary(ev.primaryTheory)}</div>
        </div>
        <div class="slbl">결과 및 역사적 의의</div>
        <p style="font-size:.84rem;color:var(--text2);line-height:1.85">${d.result}</p>
      </div>
      <div class="cd-pane" id="cdp-crit">
        <p style="font-size:.8rem;color:var(--text3);margin-bottom:.9rem;font-style:italic">이 사례와 ${tname} 분석에 대해 나머지 두 이론은 어떻게 비판하는가?</p>
        ${crits.map(c=>{
          const cc=c.name.includes('중상')?'m':c.name.includes('자유')?'l':'s';
          return `<div class="cr-box cr${cc}" style="margin-bottom:.9rem">
            <div class="cr-hd">${c.name}의 비판적 분석</div>
            <div class="cr-bd" style="font-size:.83rem">${c.content}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  det.classList.add('open');
  det.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeCase(){
  activeCase=null;
  const det=document.getElementById('case-det');
  if(det){det.classList.remove('open');}
  document.querySelectorAll('.cc').forEach(c=>c.classList.remove('selm','sell','sels'));
}
function swCDTab(btn,paneId){
  btn.closest('.cd-tabs').querySelectorAll('.cd-tab').forEach(b=>{b.classList.remove('active','act-m','act-l','act-s')});
  const cls=btn.className.match(/act-\w/);
  btn.classList.add('active');
  // find active theory color
  const cd=btn.closest('.cd');
  const tc=cd.querySelector('.bdg.bm')?'m':cd.querySelector('.bdg.bl')?'l':'s';
  btn.classList.add(`act-${tc}`);
  btn.closest('.cd-body').querySelectorAll('.cd-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById(paneId)?.classList.add('active');
}

// ════════ SUPPLEMENTS ════════
function showSup(key){
  activeSup=key;activeT=null;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('am','al','as'));
  document.querySelectorAll('.sup-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`sup-${key}`)?.classList.add('active');

  const data=IPE_DATA.supplements?.[key];
  if(!data){return;}

  const html=`
    <h2 style="margin-bottom:1.5rem;font-size:1.3rem">${data.title}</h2>
    ${(data.sections||[]).map(s=>`
      <div class="sup-sec">
        <h3>${s.t}</h3>
        <div style="font-size:.84rem;color:var(--text2);line-height:1.85;white-space:pre-line">${s.content||s.c}</div>
      </div>`).join('')}`;
  document.getElementById('theory-content').innerHTML=html;
}

// ════════ INIT ════════
document.addEventListener('DOMContentLoaded',()=>{
  buildTL();
  buildSB();
});
</script>
</body>
</html>
