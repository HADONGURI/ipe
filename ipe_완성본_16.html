<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IPE 국제정치경제론 — 전체 학습 자료</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --m:#0d9488;--ml:rgba(13,148,136,.12);--mlb:#ccfbf1;--md:#0a6660;
  --l:#2563eb;--ll:rgba(37,99,235,.12);--llb:#dbeafe;--ld:#1e40af;
  --s:#7c3aed;--sl:rgba(124,58,237,.12);--slb:#ede9fe;--sd:#5b21b6;
  --bg:#0f0f0f;--bg2:#151515;--bg3:#1c1c1c;--bg4:#242424;
  --border:#262626;--border2:#323232;
  --text:#e0d9d0;--text2:#8a8278;--text3:#4e4944;
  --accent:#c9963a;
  --sans:'Noto Sans KR',sans-serif;
  --serif:'Noto Serif KR',serif;
  --mono:'Space Mono',monospace;
  --r:8px;--rl:12px;
}
body.light{
  --bg:#f7f6f3;--bg2:#eeede9;--bg3:#e5e4e0;--bg4:#dcdbd6;
  --border:#d0cec9;--border2:#b8b6b0;
  --text:#181715;--text2:#3a3835;--text3:#7a7875;
  --accent:#8c5e10;
  --ml:rgba(13,148,136,.12);--ll:rgba(37,99,235,.12);--sl:rgba(124,58,237,.12);
  --mlb:#004d45;--llb:#0a2a6e;--slb:#3b0f8c;
}
/* 라이트모드 전용 텍스트 강화 */
body.light p{color:var(--text2)}
body.light .rc h3{color:#7a4800}
body.light .tl-nm{color:#3a3835}
body.light .tl-yr{color:#7a7875}
body.light .cc-s{color:#6a6865}
body.light .cc-t{color:#181715}
body.light .cr-bd{color:#3a3835}
body.light .sub-bd{color:#3a3835}
body.light .cd-bd{color:#3a3835}
body.light .pa{color:#181715}
body.light .pam{color:#003d35;background:rgba(13,148,136,.15)}
body.light .pal{color:#0a2060;background:rgba(37,99,235,.15)}
body.light .pas{color:#2d0a70;background:rgba(124,58,237,.15)}
body.light .pam .pa-lbl{color:#0a6660}
body.light .pal .pa-lbl{color:#1a3db0}
body.light .pas .pa-lbl{color:#5020b0}
body.light .crm .cr-hd{background:rgba(13,148,136,.2);color:#003830}
body.light .crl .cr-hd{background:rgba(37,99,235,.2);color:#0a2060}
body.light .crs .cr-hd{background:rgba(124,58,237,.2);color:#2d0a70}
body.light .sm .sub-hd{background:rgba(13,148,136,.15);color:#003830}
body.light .sl2 .sub-hd{background:rgba(37,99,235,.15);color:#0a2060}
body.light .ss .sub-hd{background:rgba(124,58,237,.15);color:#2d0a70}
body.light .hm{background:linear-gradient(135deg,rgba(13,148,136,.08),transparent)}
body.light .hl{background:linear-gradient(135deg,rgba(37,99,235,.08),transparent)}
body.light .hs{background:linear-gradient(135deg,rgba(124,58,237,.08),transparent)}
body.light .th-q{color:#4a4744}
body.light .th-s{color:#7a7875}
body.light .sb-lbl{color:#7a7875}
body.light .tbs{color:#7a7875}
body.light .tbe{color:#6a6865}
body.light .sup-btn{color:#3a3835}
body.light .cd-meta{color:#7a7875}
body.light .logo{color:#8c5e10}
body.light .nbtn{color:#4a4744}
body.light .case-lbl{color:#7a7875}
body.light #theme-toggle{color:#4a4744}
body.light .slbl{color:#7a7875}
body.light li{color:#3a3835}
body.light strong,body.light b{color:#181715}
body.light .rc p,body.light .rich-content p{color:#3a3835}
body.light .cd-body p{color:#3a3835}
body.light .tl-di p{color:#3a3835}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13.5px;line-height:1.75;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
h2{font-family:var(--serif);font-weight:400;font-size:1.5rem;line-height:1.35}
h3{font-family:var(--serif);font-weight:400;font-size:1.05rem}
h4{font-family:var(--sans);font-weight:500;font-size:.9rem}
p{color:var(--text2);line-height:1.85;margin-bottom:.85rem}
p:last-child{margin-bottom:0}
strong,b{color:var(--text);font-weight:500}
em{font-style:italic}
ul,ol{color:var(--text2);padding-left:1.4rem;margin-bottom:.75rem}
li{margin-bottom:.3rem;line-height:1.75}
li strong{color:var(--text)}
@keyframes fadeup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadein{from{opacity:0}to{opacity:1}}

/* ─── HEADER ─── */
.hdr{position:sticky;top:0;z-index:300;background:rgba(15,15,15,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:.65rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.logo{font-family:var(--mono);font-size:.75rem;color:var(--accent);letter-spacing:.1em;flex-shrink:0}
.nav{display:flex;gap:.35rem;flex-wrap:wrap}
.nbtn{padding:.28rem .75rem;border-radius:14px;font-size:.73rem;border:1px solid var(--border2);cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;white-space:nowrap}
.nbtn:hover{border-color:var(--accent);color:var(--accent)}

/* ─── TIMELINE ─── */
#tl-sec{border-bottom:1px solid var(--border);background:var(--bg2)}
.tl-hd{padding:.6rem 1.5rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.tl-lbl{font-family:var(--mono);font-size:.65rem;color:var(--text3);letter-spacing:.13em;text-transform:uppercase}
.tl-leg{display:flex;gap:.9rem;margin-left:auto}
.tl-leg span{display:flex;align-items:center;gap:.3rem;font-size:.68rem;color:var(--text3)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}

.tl-scroll{overflow-x:auto;padding:1rem 1.5rem;display:flex;align-items:flex-start;gap:0;min-height:90px}
.tl-ev{display:flex;flex-direction:column;align-items:center;gap:.32rem;cursor:pointer;flex-shrink:0;width:86px;transition:transform .18s;padding-bottom:.4rem}
.tl-ev:hover{transform:translateY(-3px)}
.tl-yr{font-family:var(--mono);font-size:.6rem;color:var(--text3);text-align:center;line-height:1.2}
.tl-nd{width:10px;height:10px;border-radius:50%;border:2px solid var(--border2);background:var(--bg);transition:all .2s;flex-shrink:0}
.tl-nd.nm{border-color:var(--m)}.tl-nd.nl{border-color:var(--l)}.tl-nd.ns{border-color:var(--s)}
.tl-ev.act .tl-nd.nm,.tl-ev:hover .tl-nd.nm{background:var(--m);box-shadow:0 0 9px var(--m)}
.tl-ev.act .tl-nd.nl,.tl-ev:hover .tl-nd.nl{background:var(--l);box-shadow:0 0 9px var(--l)}
.tl-ev.act .tl-nd.ns,.tl-ev:hover .tl-nd.ns{background:var(--s);box-shadow:0 0 9px var(--s)}
.tl-nm{font-size:.65rem;color:var(--text2);text-align:center;line-height:1.3;max-width:78px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.tl-cn{width:26px;height:1px;background:var(--border);flex-shrink:0;margin-top:42px;align-self:flex-start}

#tl-det{display:none;border-top:1px solid var(--border);background:var(--bg3);max-height:75vh;overflow-y:auto}
#tl-det.open{display:block;animation:fadeup .22s ease}
.tl-di{padding:1.5rem 1.8rem;max-width:1050px}
.tl-dt{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.1rem}
.tl-dg{display:grid;grid-template-columns:1fr 1fr;gap:1.6rem}
@media(max-width:720px){.tl-dg{grid-template-columns:1fr}}

/* ─── LAYOUT ─── */
.layout{display:flex;min-height:calc(100vh - 42px)}
.sb{width:252px;min-width:252px;border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:42px;height:calc(100vh - 42px);overflow-y:auto;padding:1.1rem}
.main{flex:1;padding:1.8rem 2rem;overflow:hidden;min-width:0}

/* sidebar */
.sb-lbl{font-family:var(--mono);font-size:.62rem;color:var(--text3);letter-spacing:.13em;text-transform:uppercase;margin-bottom:.65rem}
.sb-th{display:flex;flex-direction:column;gap:.38rem;margin-bottom:1.3rem}
.tbtn{padding:.8rem 1rem;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;transition:all .18s;background:transparent;text-align:left}
.tbtn:hover{background:var(--bg3)}
.tbtn.am{border-color:var(--m);background:var(--ml)}.tbtn.al{border-color:var(--l);background:var(--ll)}.tbtn.as{border-color:var(--s);background:var(--sl)}
.tbn{font-size:.88rem;font-weight:500;margin-bottom:.12rem}
.tbe{font-family:var(--mono);font-size:.64rem;color:var(--text3)}
.tbs{font-size:.65rem;color:var(--text3);margin-top:.22rem}
.sdiv{height:1px;background:var(--border);margin:1rem 0}

/* supplementary nav */
.sup-nav{display:flex;flex-direction:column;gap:.3rem}
.sup-btn{padding:.5rem .8rem;border-radius:var(--r);font-size:.75rem;cursor:pointer;background:transparent;border:1px solid var(--border);color:var(--text2);text-align:left;transition:all .15s}
.sup-btn:hover{background:var(--bg3);color:var(--text)}
.sup-btn.active{background:var(--bg3);border-color:var(--border2);color:var(--text)}

/* content tabs */
.ctabs{display:flex;gap:.2rem;margin-bottom:1.6rem;border-bottom:1px solid var(--border);padding-bottom:.4rem;flex-wrap:wrap}
.ctab{padding:.32rem .85rem;font-size:.76rem;cursor:pointer;border-radius:var(--r) var(--r) 0 0;color:var(--text3);transition:all .14s;background:transparent;border:none;white-space:nowrap}
.ctab:hover{color:var(--text2)}
.ctab.active{color:var(--text);border-bottom:2px solid var(--accent)}
.cpane{display:none}.cpane.active{display:block;animation:fadein .2s ease}

/* theory hero */
.t-hero{padding:1.3rem 1.5rem;border-radius:var(--rl);border:1px solid var(--border);margin-bottom:1.8rem}
.th-lbl{font-family:var(--mono);font-size:.65rem;letter-spacing:.13em;text-transform:uppercase;margin-bottom:.45rem}
.th-title{font-size:1.8rem;font-family:var(--serif);font-weight:400;margin-bottom:.3rem}
.th-q{font-size:.93rem;color:var(--text2);font-style:italic;margin-bottom:.55rem}
.th-s{font-size:.7rem;color:var(--text3);font-family:var(--mono)}
.hm{border-color:var(--m);background:linear-gradient(135deg,var(--ml),transparent)}
.hl{border-color:var(--l);background:linear-gradient(135deg,var(--ll),transparent)}
.hs{border-color:var(--s);background:linear-gradient(135deg,var(--sl),transparent)}
.cm{color:var(--m)}.cl{color:var(--l)}.cs{color:var(--s)}

/* rich content */
.rc h3{font-size:.88rem;color:var(--accent);margin-top:1.5rem;margin-bottom:.45rem;font-family:var(--sans);font-weight:500}
.rc h3:first-child{margin-top:0}
.rc p{font-size:.85rem}
.rc ul{font-size:.84rem}

/* subtheory */
.sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.75rem}
.sub-card{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .18s}
.sub-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.sub-hd{padding:.65rem 1rem;font-size:.82rem;font-weight:500;display:flex;align-items:center;justify-content:space-between}
.sub-ar{font-size:.66rem;color:var(--text3);transition:transform .2s}
.sub-card.open .sub-ar{transform:rotate(180deg)}
.sub-bd{display:none;padding:.85rem 1rem;background:var(--bg3);border-top:1px solid var(--border);font-size:.82rem;color:var(--text2);line-height:1.8}
.sub-card.open .sub-bd{display:block}
.sm .sub-hd{background:var(--ml);color:var(--mlb)}.sl2 .sub-hd{background:var(--ll);color:var(--llb)}.ss .sub-hd{background:var(--sl);color:var(--slb)}

/* case grid */
.case-sec{margin-top:2.2rem}
.case-lbl{font-family:var(--mono);font-size:.64rem;color:var(--text3);letter-spacing:.13em;text-transform:uppercase;margin-bottom:.85rem}
.c-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.65rem}
.cc{border:1px solid var(--border);border-radius:var(--r);padding:.85rem;cursor:pointer;transition:all .18s;background:var(--bg3)}
.cc:hover{background:var(--bg4);border-color:var(--border2)}
.cc.selm{border-color:var(--m)}.cc.sell{border-color:var(--l)}.cc.sels{border-color:var(--s)}
.cc-loc{font-size:.64rem;font-family:var(--mono);color:var(--text3);margin-bottom:.28rem}
.cc-t{font-size:.82rem;font-weight:500;color:var(--text);margin-bottom:.28rem;line-height:1.35}
.cc-s{font-size:.74rem;color:var(--text3);line-height:1.45}

/* case detail */
.cd{display:none;margin-top:.75rem;border:1px solid var(--border2);border-radius:var(--rl);overflow:hidden}
.cd.open{display:block;animation:fadein .22s ease}
.cd-hd{padding:1rem 1.3rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.cd-cl{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.78rem;transition:all .14s}
.cd-cl:hover{background:var(--bg4);color:var(--text)}
.cd-title{font-size:1.05rem;font-family:var(--serif);font-weight:400}
.cd-meta{font-size:.68rem;font-family:var(--mono);color:var(--text3);margin-top:.18rem}
.cd-tabs{display:flex;gap:.2rem;border-bottom:1px solid var(--border);padding:0 1.3rem}
.cd-tab{padding:.32rem .8rem;font-size:.74rem;cursor:pointer;border-radius:var(--r) var(--r) 0 0;color:var(--text3);transition:all .14s;background:transparent;border:none}
.cd-tab:hover{color:var(--text2)}
.cd-tab.active{color:var(--text)}
.cd-tab.act-m{border-bottom:2px solid var(--m)}.cd-tab.act-l{border-bottom:2px solid var(--l)}.cd-tab.act-s{border-bottom:2px solid var(--s)}
.cd-body{padding:1.1rem 1.3rem}
.cd-pane{display:none}.cd-pane.active{display:block}

/* shared UI */
.pa{border-radius:var(--r);padding:.85rem 1.05rem;margin-bottom:.9rem;font-size:.83rem;line-height:1.8}
.pa-lbl{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.38rem;font-weight:700}
.pam{background:var(--ml);border-left:3px solid var(--m);color:var(--mlb)}.pam .pa-lbl{color:var(--m)}
.pal{background:var(--ll);border-left:3px solid var(--l);color:var(--llb)}.pal .pa-lbl{color:var(--l)}
.pas{background:var(--sl);border-left:3px solid var(--s);color:var(--slb)}.pas .pa-lbl{color:var(--s)}

.cr-pair{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.75rem}
@media(max-width:680px){.cr-pair{grid-template-columns:1fr}}
.cr-box{border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cr-hd{padding:.52rem .85rem;font-size:.7rem;font-weight:500;font-family:var(--mono)}
.cr-bd{padding:.8rem .85rem;font-size:.81rem;color:var(--text2);line-height:1.8}
.cr-bd strong{color:var(--text)}
.crm .cr-hd{background:var(--ml);color:var(--mlb)}.crl .cr-hd{background:var(--ll);color:var(--llb)}.crs .cr-hd{background:var(--sl);color:var(--slb)}

.bdg{display:inline-block;padding:.16rem .52rem;border-radius:4px;font-size:.66rem;font-weight:500;font-family:var(--mono);border:1px solid}
.bm{background:var(--ml);color:var(--m);border-color:var(--m)}
.bl{background:var(--ll);color:#5b9cf6;border-color:#5b9cf6}
.bs{background:var(--sl);color:#a78ee8;border-color:#a78ee8}
.ba{background:rgba(201,150,58,.1);color:var(--accent);border-color:var(--accent)}

.div{height:1px;background:var(--border);margin:1.2rem 0}
.slbl{font-family:var(--mono);font-size:.64rem;color:var(--text3);letter-spacing:.13em;text-transform:uppercase;margin-bottom:.55rem}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:260px;color:var(--text3);gap:.4rem;text-align:center}
.ei{font-size:2rem;opacity:.2}

/* supplement sections */
.sup-sec{margin-bottom:1.8rem}
.sup-sec h3{font-size:.9rem;color:var(--accent);margin-bottom:.5rem;font-weight:500;padding-bottom:.35rem;border-bottom:1px solid var(--border)}
.sup-sec p{font-size:.84rem}
.sup-sec ul{font-size:.83rem}

@media(max-width:860px){.layout{flex-direction:column}.sb{width:100%;min-width:unset;position:static;height:auto;border-right:none;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">IPE.STUDY</div>
  <nav class="nav">
    <button class="nbtn" onclick="scrollTo('tl-sec')">📅 연대기 타임라인</button>
    <button class="nbtn" onclick="scrollTo('main-sec')">📚 3대 이론</button>
    <button class="nbtn" onclick="selectT('mercantilism')">중상주의</button>
    <button class="nbtn" onclick="selectT('liberalism')">경제적 자유주의</button>
    <button class="nbtn" onclick="selectT('structuralism')">구조주의</button>
    <button class="nbtn" onclick="showSup('ipe101')">IPE란?</button>
    <button class="nbtn" onclick="showSup('debtCrisis')">부채위기</button>
    <button class="nbtn" onclick="showSup('tradeStructure')">무역구조</button>
    <button class="nbtn" onclick="showSup('moneyFinance')">화폐·금융</button>
    <button class="nbtn" onclick="showSup('tnc')">TNC·FDI</button>
    <button class="nbtn" onclick="showSup('postNeo')">포스트신자유주의</button>
  </nav>
  <button id="theme-toggle" onclick="toggleTheme()" style="margin-left:auto;padding:.28rem .8rem;border-radius:14px;font-size:.73rem;border:1px solid var(--border2);cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;white-space:nowrap;flex-shrink:0">🌙 다크</button>
</header>

<!-- TIMELINE -->
<section id="tl-sec">
  <div class="tl-hd">
    <span class="tl-lbl">연대기 타임라인 — 리딩자료 전체 사례</span>
    <span style="font-size:.72rem;color:var(--text3)">클릭 → 상세 내용 + 이론 간 비판</span>
    <div class="tl-leg">
      <span><span class="dot" style="background:var(--m)"></span>중상주의</span>
      <span><span class="dot" style="background:var(--l)"></span>자유주의</span>
      <span><span class="dot" style="background:var(--s)"></span>구조주의</span>
    </div>
  </div>
  <div class="tl-scroll" id="tl-scroll"></div>
  <div id="tl-det"></div>
</section>

<!-- MAIN -->
<div class="layout">
  <aside class="sb">
    <div class="sb-lbl">IPE 3대 이론</div>
    <div class="sb-th" id="sb-th"></div>
    <div class="sdiv"></div>
    <div class="sb-lbl">심화 주제</div>
    <div class="sup-nav">
      <button class="sup-btn" id="sup-ipe101" onclick="showSup('ipe101')">📖 IPE란 무엇인가 (Ch.1)</button>
      <button class="sup-btn" id="sup-debtCrisis" onclick="showSup('debtCrisis')">💸 부채·금융위기 (Ch.8)</button>
      <button class="sup-btn" id="sup-tradeStructure" onclick="showSup('tradeStructure')">🌐 무역구조 (Ch.6)</button>
      <button class="sup-btn" id="sup-moneyFinance" onclick="showSup('moneyFinance')">💱 화폐·금융 (Ch.7 + Top Dollar)</button>
      <button class="sup-btn" id="sup-tnc" onclick="showSup('tnc')">🏢 TNC·FDI (Ch.17)</button>
      <button class="sup-btn" id="sup-postNeo" onclick="showSup('postNeo')">🔄 포스트 신자유주의 (5주차 2강)</button>
    </div>
    <div class="sdiv"></div>

      bg:'1776년은 미국 독립선언의 해이기도 하지만, 경제 사상사에서는 애덤 스미스(Adam Smith)의 <em>국부론(An Inquiry into the Nature and Causes of the Wealth of Nations)</em> 출간으로 더 중요합니다. 당시 유럽을 지배하던 중상주의—금·은 축적과 무역수지 흑자를 국력의 척도로 보는 사상—를 정면으로 비판한 혁명적 저작이었습니다.',
      content:`스미스의 핵심 주장 두 가지:

① "보이지 않는 손(Invisible Hand)":
개인이 자신의 이익을 추구할 때, 의도하지 않았더라도 사회 전체의 이익이 자연스럽게 증진된다. 국가가 개입하지 않아도 시장이 자원을 가장 효율적으로 배분한다. 이것이 자유방임(laissez-faire)의 이론적 토대입니다.

② 분업과 자유무역:
핀 공장 사례—혼자서 핀을 만들면 하루 20개, 분업하면 하루 4,800개. 분업이 생산성을 폭발적으로 높입니다. 이 논리를 국가 간으로 확장하면 자유무역이 됩니다—각국이 자신이 잘하는 것에 특화하고 나머지는 수입하면 모두가 이익입니다.

③ 중상주의 비판:
"한 나라의 부는 금·은의 양이 아니라 국민이 소비할 수 있는 재화와 서비스의 총량이다." 무역수지 흑자 집착은 다른 나라를 희생시키는 제로섬 게임에 불과합니다.

스미스는 동시에 기업가들의 담합과 독점에도 비판적이었습니다. "같은 업종의 사람들이 모이면 반드시 소비자에게 해를 끼치는 음모를 꾸민다"는 구절은 오늘날에도 유효합니다.`,
      result:'국부론은 19세기 영국의 경제 정책 패러다임을 중상주의에서 자유주의로 전환시켰습니다. 1846년 곡물법 폐지, 자유무역 확대의 이론적 근거가 됐습니다. 이후 리카르도의 비교우위론, 밀의 수정 자유주의, 케인즈의 수정, 신자유주의까지—모든 자유주의 경제 사상의 출발점이 됩니다.',
      c1:{n:'중상주의',c:'중상주의자들은 스미스의 자유방임이 현실을 무시한 이상론이라고 반박합니다. 리스트(Friedrich List)의 반격이 가장 날카롭습니다: "스미스가 자유무역을 주창할 당시 영국은 이미 세계 최강의 제조업 국가였다. 자신이 사다리를 타고 올라간 후 그 사다리를 걷어차는 것이다." 현실에서 자유무역은 강한 나라에게만 유리한 체제이며, 유치산업 보호가 없으면 후발 국가는 영원히 원자재 공급국으로 머무르게 됩니다.'},
      c2:{n:'구조주의',c:'마르크스는 스미스를 부르주아 이데올로기의 대변자로 비판했습니다. "보이지 않는 손"은 실제로는 자본가 계급의 손입니다. 시장에서 노동자와 자본가는 동등한 협상력으로 만나지 않습니다. 노동자는 생산 수단을 갖지 못하므로 구조적으로 착취에 노출됩니다. 스미스가 묘사한 자발적 교환의 이면에는 계급 권력의 불균형이 작동합니다. 또한 스미스가 비판한 독점과 담합은 자본주의가 성숙할수록 필연적으로 강화되는 경향이 있습니다—마르크스가 이를 자본의 집중이라 불렀습니다.'}

      title:'마르크스 『공산당 선언』 출간',tag:'경제사상',theory:'structuralism',tc:'s',
      summary:'구조주의의 탄생 선언 — "지금까지의 모든 사회의 역사는 계급투쟁의 역사다"',
      bg:'1848년은 유럽 전역에서 혁명의 물결이 휩쓴 해입니다(프랑스·독일·오스트리아·이탈리아 동시 혁명). 이 격변의 해에 카를 마르크스(Karl Marx)와 프리드리히 엥겔스(Friedrich Engels)는 런던에서 공산당 선언(Manifest der Kommunistischen Partei)을 출간했습니다. 산업혁명이 만들어낸 공장 노동자(프롤레타리아)의 비참한 현실이 이 저작의 배경입니다.',
      content:`『공산당 선언』의 핵심 주장:

① 역사는 계급투쟁의 역사다:
"지금까지의 모든 사회의 역사는 계급투쟁의 역사다." 노예와 주인, 농노와 영주, 노동자와 자본가—역사의 원동력은 이 갈등입니다.

② 부르주아지의 혁명적 역할과 모순:
마르크스는 자본가 계급(부르주아지)이 봉건제를 타파한 혁명적 역할을 했다고 인정합니다. 그러나 자본주의는 스스로 자신을 파괴할 모순을 품고 있습니다—과잉생산, 이윤율 저하 경향, 노동자의 빈곤화.

③ 국제주의:
"만국의 노동자여, 단결하라!" 자본은 국경을 넘어 이미 국제화됐으므로, 노동자의 저항도 국제적이어야 합니다.

자본론(Das Kapital, 1867)에서 발전시킨 핵심 개념:
• 잉여가치(Surplus Value): 노동자가 만드는 가치와 임금의 차이—자본가의 이윤의 원천
• 상품 물신성(Commodity Fetishism): 인간 관계가 상품 관계로 위장되는 현상
• 자본의 유기적 구성: 기계(불변자본)의 비율이 높아질수록 이윤율이 저하되는 경향`,
      result:'공산당 선언은 이후 러시아 혁명(1917), 중국 혁명(1949), 쿠바 혁명(1959) 등 20세기 거의 모든 사회주의 혁명의 사상적 토대가 됐습니다. IPE에서는 레닌의 제국주의론, 월러스틴의 세계체제론, 종속이론 등 구조주의 계열 이론의 원류입니다. 오늘날에도 소득 불평등, 금융위기, TNC의 착취 구조를 분석하는 데 마르크스주의적 분석 틀이 폭넓게 활용됩니다.',
      c1:{n:'경제적 자유주의',c:'자유주의자들은 마르크스의 진단은 틀렸고 처방은 더 나쁜 결과를 낳았다고 봅니다. 시장 경제는 착취가 아니라 자발적 교환의 체제이며, 자본주의는 역사상 가장 많은 사람들을 빈곤에서 구해냈습니다. 소련과 마오쩌둥 중국의 집단화가 수천만 명을 아사시킨 것이 계획경제의 실증적 실패를 보여줍니다. 또한 마르크스의 이윤율 저하 경향은 기술혁신으로 상쇄됩니다—자본주의는 마르크스가 예측한 대로 붕괴하지 않았습니다.'},
      c2:{n:'중상주의',c:'중상주의는 마르크스의 계급 분석보다 국가와 민족을 더 중요한 분석 단위로 봅니다. 마르크스의 "만국의 노동자 단결" 호소는 현실에서 작동하지 않았습니다—1914년 1차 세계대전 때 각국 사회주의자들은 민족주의를 선택했습니다. 국가 이익과 계급 이익이 충돌할 때, 인간은 계급보다 민족을 선택하는 경향이 있습니다. 또한 마르크스는 국가를 단순히 자본가 계급의 도구로 보았지만, 국가는 독자적인 이해와 전략을 가진 행위자입니다.'}

    ,,{
      id:'tl-023',year:'1917',yn:1917,loc:'러시아',
      title:'레닌 『제국주의론』 + 러시아 혁명',tag:'구조주의·혁명',theory:'structuralism',tc:'s',
      summary:'자본주의의 최고 단계로서의 제국주의 — 자본 수출이 식민지 쟁탈을 낳는다',
      bg:'1917년은 두 가지 역사적 사건이 동시에 일어난 해입니다. 2월에는 레닌이 <em>제국주의: 자본주의의 최고 단계(Imperialism, the Highest Stage of Capitalism)</em>를 출간했고, 10월에는 볼셰비키 혁명으로 세계 최초의 사회주의 국가 소련이 탄생했습니다. 당시 유럽 열강들은 아프리카·아시아의 식민지를 놓고 치열하게 경쟁하고 있었고, 그 갈등이 1차 세계대전(1914~18)으로 폭발했습니다.',
      content:`레닌의 제국주의론 핵심:

① 독점 자본주의 단계:
자유경쟁 자본주의 → 독점 자본주의로 진화. 은행과 산업 자본이 결합하여 금융 자본이 형성됩니다.

② 자본 수출의 필연성:
선진국 내에서 이윤율이 낮아지면 자본은 더 높은 이윤을 찾아 해외로 수출됩니다. 식민지는 원자재 공급처, 과잉 자본의 투자처, 과잉 생산물의 판매 시장 역할을 합니다.

③ 제국주의는 전쟁을 낳는다:
각국 독점 자본이 식민지를 놓고 경쟁하면 필연적으로 전쟁이 발생합니다. 1차 세계대전이 바로 이 제국주의 전쟁의 결과입니다.

월러스틴의 재해석 (4주차 2강):
러시아 혁명을 이념적 사건이 아닌 구조적 사건으로 봅니다. 쇠퇴하던 반주변부 국가(러시아)가 핵심부로 도약하기 위해 국가 주도 중상주의적 전략을 채택한 것입니다. "일국 사회주의"는 자본주의의 대안이 아니라 세계체제 내에서 위상을 올리려는 시도였습니다.`,
      result:'레닌의 제국주의론은 식민지 해방 운동과 비동맹 운동의 이론적 기반이 됐습니다. 오늘날에도 다국적기업의 개도국 투자, 미국의 해외 군사 개입 등을 분석하는 데 이 틀이 사용됩니다. 러시아 혁명은 냉전 체제(1947~1991)를 만들어냈고, 이후 모든 국제정치경제 질서 형성에 결정적 영향을 미쳤습니다.',
      c1:{n:'경제적 자유주의',c:'자유주의자들은 레닌의 분석이 부분적으로는 맞지만 해결책이 틀렸다고 봅니다. 식민지 착취는 실제로 존재했지만, 자유무역과 국제 제도를 통한 개혁이 혁명보다 더 지속 가능한 해결책입니다. 실제로 소련은 결국 붕괴했고, 자유민주주의 국가들이 오히려 더 높은 생활수준을 달성했습니다. 오늘날 FDI는 착취가 아니라 기술 이전과 고용 창출을 통해 개도국 발전에 기여하는 측면도 있습니다.'},
      c2:{n:'중상주의',c:'중상주의는 레닌의 분석이 계급 모순에 집중하면서 국가 간 권력 경쟁의 독자적 역할을 과소평가한다고 봅니다. 제국주의는 자본주의의 산물만이 아니라 국가 권력 확장의 욕구에서도 비롯됩니다. 실제로 소련 자체가 이후 제국주의적 행동(동유럽 위성국 지배, 아프가니스탄 침공)을 보였습니다. 자본주의를 폐지해도 강대국의 패권 경쟁은 사라지지 않습니다.'}

    ,,{
      id:'tl-024',year:'1930',yn:1930,loc:'미국',
      title:'스무트-홀리 관세법 — 대공황과 보호무역의 악순환',tag:'보호무역',theory:'mercantilism',tc:'m',
      summary:'관세 65% 인상 → 보복 관세 → 세계 무역 54% 붕괴 → 대공황 심화 — 보호무역주의의 역사적 교훈',
      bg:'1929년 10월 미국 주식시장이 붕괴하면서 대공황이 시작됐습니다. 이미 농업 위기와 실업 문제로 고통받던 미국에서 자국 산업 보호를 요구하는 정치적 압력이 거세졌습니다. 공화당 의원 스무트(Reed Smoot)와 홀리(Willis Hawley)가 발의한 관세법이 1930년 6월 허버트 후버 대통령의 서명으로 발효됐습니다.',
      content:`스무트-홀리 관세법의 내용과 파장:

규모: 약 2만 개 수입품에 평균 45~65%의 관세 부과. 역사상 미국이 시행한 가장 높은 수입 관세 중 하나입니다.

즉각적 반응:
• 캐나다: 미국산 30개 품목에 보복 관세
• 영국: 영연방 특혜관세 체제 구축 (미국 배제)
• 독일·프랑스·이탈리아: 보복 관세 및 수입 할당
• 1930~33년 사이 세계 무역 규모 54% 붕괴

결과: 대공황 심화
미국 수출이 크게 감소하면서 수출 기업들이 연쇄 도산했습니다. 1932년 미국 실업률은 25%에 달했습니다. 보호무역이 오히려 자국 경제를 더 큰 위기로 몰아넣은 역설적 사례입니다.

"근린궁핍화(Beggar-thy-neighbor) 정책":
자국 경제를 살리기 위해 이웃나라를 희생시키는 정책. 각국이 동시에 이 전략을 취하면 결국 모두가 더 나빠집니다. 이것이 브레턴우즈 체제 설계자들(케인즈, 화이트)이 GATT와 IMF를 만든 근본적 이유입니다.`,
      result:'스무트-홀리 관세법은 오늘날까지 보호무역주의의 위험성을 보여주는 역사적 교훈으로 인용됩니다. 브레턴우즈 회의(1944)에서 GATT를 설계할 때 이 실패의 반복을 막는 것이 핵심 목표였습니다. 교재 Ch.6: "국제무역이 1929년과 1933년 사이 약 54퍼센트 가량 줄어드는 가운데 1930년대 대공황의 시기에 보호주의 기운은 급상승했다." 오늘날 트럼프의 고율 관세에 대한 비판에서도 이 사례가 자주 등장합니다.',
      c1:{n:'경제적 자유주의',c:'자유주의자들에게 스무트-홀리는 보호무역주의의 가장 강력한 반면교사입니다. 자유무역이 가져다주는 이익을 입증하는 역설적 증거이기도 합니다—보호무역이 얼마나 파괴적인지를 보여줌으로써요. 경제학자 1,000명 이상이 서명한 청원서가 후버 대통령에게 거부권 행사를 촉구했지만 무시됐습니다. 시장의 자연스러운 조정 대신 정치적으로 설계된 관세가 세계 경제를 파국으로 몰았습니다.'},
      c2:{n:'구조주의',c:'구조주의는 스무트-홀리를 개별 정책 실수가 아니라 자본주의 체제의 구조적 모순이 폭발한 결과로 봅니다. 대공황 자체가 자본주의의 과잉생산 위기—마르크스가 예언한 이윤율 저하와 자본 과잉 축적의 결과—였습니다. 스무트-홀리는 증상이지 원인이 아닙니다. 더 근본적으로는 불평등한 소득 분배로 소비 수요가 생산을 따라잡지 못하는 구조적 문제가 대공황을 낳았고, 보호무역주의는 그 귀결이었습니다.'}

      title: '브레턴우즈 체제 창설',

      detail: {
        background: `1930년대 대공황은 자유방임 자본주의의 참담한 실패였습니다. 각국이 "근린궁핍화(beggar-thy-neighbor)" 정책—자국 경제를 살리기 위해 관세 장벽을 높이고 통화를 평가절하하는 경쟁—을 벌이면서 세계 무역이 붕괴했습니다. 이런 경제적 혼란이 파시즘과 나치즘의 부상, 결국 2차 세계대전으로 이어졌다는 반성이 전후 질서 설계의 출발점이었습니다.

1944년 7월, 2차 세계대전의 연합국 44개국 대표가 미국 뉴햄프셔 주 브레턴우즈에 모였습니다.`,
        content: `이 회의에서 두 가지 핵심 설계안이 대립했습니다.

영국의 케인즈안: 채무국과 채권국 모두에게 부담을 나누는 균형 잡힌 국제 통화 체제를 제안했습니다. "방코르(Bancor)"라는 새로운 국제 통화를 창설하고, 과도한 흑자를 내는 나라도 그 흑자를 재활용하도록 의무를 지우자고 했습니다.

미국의 화이트안: 달러를 국제 기축통화로 하고 부담을 적자국(채무국)에게만 지우는 방안을 제안했습니다. 당시 세계 최대 채권국이자 금의 2/3를 보유한 미국에게 유리한 안이었습니다.

결국 미국의 안이 채택되었습니다. 미국이 IMF 준비금의 31%를 차지해 사실상 거부권을 가진 상황에서 케인즈안은 수용되지 않았습니다.

이 결과로 탄생한 것이:
• IMF (국제통화기금): 국제수지 위기국에 단기 자금 지원, 구조조정 요구
• 세계은행: 전후 복구 및 개발 지원
• GATT (관세 및 무역에 관한 일반협정): 자유무역 규범 구축
• 달러-금 고정환율제: 달러를 금 1온스=35달러로 고정, 다른 통화를 달러에 연동`,
        result: `브레턴우즈 체제는 1947년부터 1971년까지 약 25년간 국제 통화·금융 질서의 기반이 되었습니다. 이 기간 동안 서유럽과 일본의 전후 복구가 이루어지고 자유무역이 확대되면서 전례 없는 경제 성장이 달성됐습니다.

그러나 체제는 구조적 모순(트리핀 딜레마)을 안고 있었습니다. 달러가 국제 통화로 기능하려면 미국이 적자를 내야 하지만, 달러를 금과 교환해주겠다는 약속을 유지하려면 적자가 작아야 한다는 모순입니다. 베트남전 비용과 국내 사회 지출이 쌓이면서 1971년 닉슨 대통령이 달러의 금태환을 일방적으로 정지("닉슨 쇼크")하면서 브레턴우즈 체제가 붕괴했습니다.`,
        critiques: {
          theory2: {
            name: '중상주의',
            content: `중상주의자들은 브레턴우즈 체제가 "국제 협력"으로 포장됐지만 실제로는 미국이 패권을 제도화한 것이라고 봅니다.

미국이 IMF 준비금의 31%를 차지해 사실상 거부권을 행사할 수 있었고, 달러를 기축통화로 만들어 "과도한 특권(exorbitant privilege)"을 누렸습니다. 달러 표시 부채를 달러를 찍어 갚을 수 있는 특권, 더 낮은 이자율로 차입할 수 있는 특권이 그것입니다.

케인즈가 제안한 채권국(미국) 책임 분담 방안은 미국 의회가 거부했습니다. 결국 조정의 고통은 모두 채무국(주로 개도국)이 감당하도록 설계되었습니다. IMF의 구조조정 프로그램이 개도국에 가혹한 긴축을 요구하면서 수백만 명의 삶을 파괴한 것이 이 구조적 편향의 결과입니다.`
          },
          theory3: {
            name: '구조주의',
            content: `구조주의는 브레턴우즈를 선진국 자본주의 체제의 안정화 기제로 봅니다.

44개국 대표가 참석했지만, 식민지 국가들은 대부분 배제되었습니다. 아직 독립하지 못한 아프리카·아시아 국가들은 이 체제 설계에 아무런 발언권이 없었습니다. IMF와 세계은행의 투표권은 출자 비율에 따라 결정되어 부유한 나라들이 지배 구조를 독점합니다.

이후 IMF의 구조조정 프로그램은 위기에 처한 개도국에게 긴축, 민영화, 무역 자유화를 강요했습니다. 이것이 해당 국가 노동자들의 실질 임금을 낮추고 공공서비스를 삭감하면서 외채를 갚을 수 있는 조건을 만들었습니다—채권국 선진국과 그 은행들의 이익을 위해.

그람시의 헤게모니론에서 보면, 달러 기축통화 체제는 단순한 경제 체제가 아니라 미국의 패권적 이데올로기가 "자연스러운 질서"로 수용되도록 만드는 구조입니다.`
          }

    {
      id: 'tl-016',
      year: '1947~1995',
      yearNum: 1970,
      title: 'GATT에서 WTO로 — 다자무역체제의 진화',
      location: '국제(제네바)',
      primaryTheory: 'liberalism',
      tag: '국제무역규범',
      detail: {
        background: `2차 세계대전 직후 미국은 국제무역기구(ITO) 설립을 원했지만 미 의회가 거부했습니다. 대신 한시적 협정으로 GATT(관세 및 무역에 관한 일반협정)가 1948년 출범합니다. 교재 Ch.6: 1930년대 스무트-할리 관세와 전세계 보호무역주의가 대공황을 악화시키고 심지어 파시즘 등장에 기여했다는 반성이 GATT 창설의 배경이었습니다.`,
        content: `GATT의 두 기본 원칙 (교재 Ch.6):
• 호혜(reciprocity): 모든 회원국이 함께 무역장벽을 낮춥니다
• 비차별(nondiscrimination): 내국민대우 + 최혜국대우

주요 협상 라운드:
• 케네디라운드: 공산품 관세 대폭 인하
• 도쿄라운드(1978~79): 비관세장벽(NTBs) 문제 처음 다룸. 관세 평균 9%까지 하락
• 우루과이라운드(1986~1993): 섬유·농산물·지식재산권·서비스 포함. WTO 창설 합의

WTO 창설(1995):
• 157개 회원국, 세계 무역의 97% 담당
• 분쟁해결심판제도(DSP) 도입 — GATT와 달리 강제 메커니즘 보유
• GATS(서비스무역일반협정), TRIPs(지식재산권협정) 포함

도하 개발라운드(2001~)의 좌절:
• 1999 시애틀 각료회담: 반세계화 시위로 결렬 ("Battle in Seattle")
• 핵심 갈등: 선진국(공산품 관세 인하 요구) vs 개도국(농업 보조금 철폐 요구)
• 미국이 2002년 농업법으로 오히려 보조금 700억달러 증액 — 협상 공염불
• 2008년 이후 사실상 교착 상태`,
        result: `도하라운드 실패는 자유주의적 다자무역체제의 한계를 보여줍니다. 교재 Ch.6 결론: "WTO 회원국들이 경제적 자유주의, 중상주의, 구조주의적 무역관행을 뒤섞어 따르고 있다는 사실로 볼 때 작금의 상황은 관리무역체제(managed trade system)로 묘사된다." 대신 양자간·지역 무역협정(RTAs)이 급증해 2010년경 세계 무역의 60%가 지역 무역권 내에서 이루어집니다.`,
        critiques: {
          theory2: {
            name: '중상주의',

      primaryTheory: 'mercantilism',
      tag: '환율·통화',
      detail: {
        background: `1960년대 미국은 베트남전쟁 비용과 존슨 대통령의 "위대한 사회(Great Society)" 프로그램(복지 확대)으로 막대한 재정지출을 했습니다. 이 지출은 달러를 대량으로 찍어내는 방식으로 충당되었습니다.

브레턴우즈 체제 아래에서 달러 가치는 금 1온스=35달러로 고정되어 있었는데, 달러 공급이 폭발적으로 늘어나자 달러의 실질 가치는 이 고정 환율보다 훨씬 낮아졌습니다. 유럽 국가들, 특히 프랑스의 드골 대통령은 미국이 달러를 찍어 유럽에 인플레이션을 수출한다고 강하게 불만을 표했습니다.`,
        content: `결국 1971년 8월 15일, 닉슨 대통령은 TV 연설에서 충격적인 발표를 합니다: 달러의 금태환을 일방적으로 정지한다고. 어떤 나라도 사전에 통보받지 못했습니다. 이것이 "닉슨 쇼크"입니다.

동시에 닉슨은 모든 수입품에 10%의 과징금을 부과하고 임금·가격 통제를 실시했습니다. 이는 1944년 브레턴우즈 합의를 미국이 일방적으로 파기한 것이었습니다.

1971년 스미소니언 협정으로 달러 가치를 조정했지만 불안정은 계속되었고, 1973년부터 주요 통화들이 자유 변동환율제로 이행했습니다—각국 통화가 시장에서 수요와 공급에 따라 환율이 결정되는 체제입니다. 이것이 오늘날까지 이어지는 현행 변동환율제의 시작입니다.`,
        result: `브레턴우즈 고정환율제의 붕괴는 국제 통화 체제에 근본적인 변화를 가져왔습니다. 변동환율제로의 이행으로 환율이 시장에서 결정되면서 통화 투기가 가능해졌고, 국제 자본 이동이 폭발적으로 늘어났습니다.

이 변화는 이후 OPEC 오일쇼크(1973, 1979), 석유달러 재순환, 개도국 부채 위기, 아시아 금융위기 등의 연결고리의 출발점이 됩니다.`,
        critiques: {
          theory2: {
            name: '경제적 자유주의',
            content: `자유주의자들은 닉슨 쇼크를 동맹국과의 합의를 저버린 단기적 정치적 결정으로 비판합니다.

케인즈주의적 자유주의 관점에서는, 국내 정치적 목적(베트남전과 선거)을 위해 국제 통화 체제의 안정을 희생시킨 것입니다. 브레턴우즈 체제가 유지됐다면 세계 경제의 안정성이 더 높았을 것입니다.

신자유주의적 관점에서는 다르게 봅니다. 변동환율제가 실제로 더 효율적이며, 시장이 결정하는 환율이 정치적으로 설정된 고정환율보다 실제 경제를 더 잘 반영한다고 봅니다. 닉슨 쇼크는 불가피한 전환의 촉매였을 뿐이라는 해석도 있습니다.`

미국은 브레턴우즈 체제를 설계하면서 달러에게 기축통화 지위를 부여해 "과도한 특권"을 누렸습니다. 그리고 그 체제가 미국에게 불리해지자 다른 나라들의 동의 없이 일방적으로 파기했습니다. 이것이 미국 패권의 본질을 드러냅니다—미국은 자신에게 유리할 때는 다자주의 제도를 활용하고, 불리해지면 이를 무시합니다.

달러의 금태환 정지 이후에도 달러는 여전히 기축통화로 남았습니다. 이것이 Prasad(Top Dollar)가 지적하는 역설입니다—달러의 패권은 미국의 '강함'이 아니라 대안의 '약함'에 의존합니다.`
          }

      }

        content: `세계체제론의 핵심 주장:

② 노예제 폐지의 경제적 해석:
"노예제 폐지는 인도주의가 아니라 현지 임금 노동자가 경제적으로 더 효율적이었기 때문이다." 역사적 "진보"를 자본주의의 효율 논리로 해체합니다.

③ 러시아 혁명의 재해석:
"이념적 사건이 아니라, 쇠퇴하던 반주변부 국가가 핵심부로 진입하기 위한 국가 주도 중상주의적 생존 전략." '일국 사회주의'는 자본주의 외부의 대안이 아니라, 세계체제 내에서 자국 위상을 끌어올리는 변형된 국가 자본주의로 기능했습니다.

3층 구조:
• 핵심부(Core): 고부가가치 산업·첨단 기술·자본 집중
• 반주변부(Semi-periphery): 중간 위치. 체제 안정화 장치 — 주변부에게 "노력하면 올라갈 수 있다"는 희망을 주어 저항을 분산시킵니다.
• 주변부(Periphery): 원자재·저임금 노동 제공. 핵심부에 종속.`,
        result: `세계체제론은 IPE 구조주의의 핵심 이론이 되었습니다. 종속이론을 세계적 규모로 확장하고, 마르크스주의를 국제 관계에 적용하는 데 중요한 기여를 했습니다. 교재 Ch.6도 이 관점에서 개도국의 원자재 수출 의존 패턴이 식민지 시대의 반복임을 지적합니다.`,

    {
      id: 'tl-005',
      year: '1973~1979',
      yearNum: 1975,
      title: 'OPEC 오일쇼크와 석유달러',
      location: '중동·국제',
      primaryTheory: 'mercantilism',
      tag: '에너지·통화',
      detail: {
        background: `1973년 10월, 제4차 중동전쟁(욤키푸르 전쟁)이 발발하면서 아랍 산유국들이 이스라엘을 지원하는 서방국가들에 대해 석유 수출을 금지하는 금수조치를 단행했습니다. OPEC(석유수출국기구)은 동시에 원유 생산량을 감산했습니다. 국제 유가는 3개월 만에 4배 가까이 폭등했습니다.

이것이 제1차 오일쇼크(1973~74)입니다. 제2차 오일쇼크는 1978~79년 이란 혁명으로 이란 원유 생산이 급감하면서 발생했습니다.`,
        content: `오일쇼크의 영향은 복층적이었습니다:

첫째, 서방 선진국들에게 스태그플레이션(경기침체 + 인플레이션 동시 발생)을 가져왔습니다. 기존의 케인즈주의 정책(경기침체에는 재정지출 확대)이 인플레이션을 악화시키는 상황에서 무력화되었습니다. 이것이 1980년대 신자유주의로의 전환의 한 계기가 됩니다.

둘째, 석유달러(petrodollar) 순환이라는 새로운 금융 메커니즘이 만들어졌습니다. OPEC 국가들은 석유 수출로 막대한 달러를 벌어들였고, 이 돈을 서방의 대형 상업은행(뉴욕, 런던)에 예치했습니다. 은행들은 이 돈을 제3세계 개도국에 대출했습니다. 개도국들은 석유 가격 상승으로 더 많은 외화가 필요했고, 원자재 수출 호황으로 자신감에 차 있었습니다.

셋째, 이 석유달러 대출이 1978~1979년 사이 개도국 부채를 1,000억 달러에서 6,000억 달러로 6배 급등시켰습니다. 이것이 1982년 멕시코 채무불이행 선언으로 시작되는 1980년대 개도국 부채위기의 씨앗이 됩니다.`,
        result: `오일쇼크는 여러 측면에서 현대 세계 경제를 재형성했습니다. 신자유주의로의 이념적 전환, 금융화의 가속, 개도국 부채위기, 에너지 효율화와 대체 에너지 연구 촉진이 모두 이 사건의 파급 효과입니다.

또한 OPEC가 석유를 정치적 무기로 사용할 수 있음을 보여주면서, 자원 에너지의 안보적 중요성이 새롭게 인식되었습니다.`,
        critiques: {
          theory2: {
            name: '경제적 자유주의',
            content: `자유주의자들은 오일쇼크가 시장 왜곡과 카르텔의 폐해를 보여준다고 봅니다. OPEC는 경쟁을 억제하는 카르텔로, 시장의 자연스러운 가격 결정을 방해합니다.

오일쇼크에 대한 올바른 대응은 에너지 시장 다양화와 가격 자유화입니다. 정부가 에너지 가격을 통제하면 오히려 에너지 절약 유인을 없애고 비효율이 지속됩니다. 실제로 1980년대 레이건 행정부가 석유 가격 통제를 폐지한 후 에너지 효율이 높아지고 석유 소비가 감소했습니다.

석유달러의 재순환은 시장이 대규모 자금 불균형을 처리한 방식으로 볼 수 있습니다. 문제는 개도국이 이 자금을 비효율적으로 사용했고 상환 능력 이상으로 차입한 것입니다.`
          },
          theory3: {
            name: '구조주의',
            content: `구조주의는 석유달러 재순환을 개도국을 부채 종속에 빠뜨리는 구조적 메커니즘으로 분석합니다.

OPEC 석유달러가 서구 은행을 거쳐 개도국 대출로 재순환된 것은, 핵심부 금융기관들이 수익을 위해 개도국에 과도한 대출을 밀어 넣은 것입니다. 은행들은 위험을 충분히 경고하지 않았고, IMF와 서방 정부들도 방관했습니다.

1982년 멕시코가 채무불이행을 선언한 후 IMF가 처방한 구조조정 프로그램은 멕시코 노동자들의 실질임금을 삭감하고 공공 지출을 줄이도록 강요했습니다. 이 과정에서 누가 이익을 얻었나요? 서방 은행들은 채권을 회수했고, 채무국 국민들은 고통을 감내했습니다. 이것이 구조주의가 말하는 "계급 투쟁의 국제화"입니다.`

      tag: '경제 패러다임',
      detail: {
        background: `1970년대의 경험—오일쇼크, 스태그플레이션, 케인즈주의 정책의 실패—은 기존 경제 패러다임에 대한 근본적 의문을 제기했습니다. 영국에서 1979년 마거릿 대처가, 미국에서 1981년 로널드 레이건이 집권하면서 경제 정책의 패러다임이 극적으로 전환됩니다.`,
        content: `신자유주의 정책의 핵심 내용:

영국 대처 정부:
• 국유기업 대규모 민영화 (영국항공, 브리티시 텔레콤, 영국가스 등)
• 강력한 노조 분쇄 (1984~85년 광원 파업 강경 진압)
• 금융 빅뱅(1986) — 런던 금융시장 탈규제
• 복지 지출 삭감, 소득세 인하

미국 레이건 행정부:
• 소득세 최고 세율 70% → 28%로 대폭 인하 (공급측 경제학)
• 기업 규제 완화
• 연준 폴 볼커의 고금리 정책으로 인플레이션 잡기 (그 결과 1981~82년 심각한 경기침체)
• 금융 탈규제

워싱턴 컨센서스: 이 정책들이 IMF·세계은행을 통해 개도국에도 확산됩니다. 위기에 처한 개도국에 지원을 제공하는 조건으로 민영화, 무역 자유화, 재정 긴축, 금리 인상을 요구했습니다.

결과: 1982~2015년 미국 상장기업 시총이 GDP 대비 35% → 95%로 급등. 민간 부문 폭발적 성장. 동시에 제조업 고용 비중 22% → 9% 하락, 상위 0.1%의 부는 두 배로 증가.`,
        result: `신자유주의는 1980~90년대 경제 성장과 인플레이션 억제에 성과를 거뒀습니다. 그러나 2000년대 이후 그 부작용이 가시화됩니다. 불평등 심화, 금융 위기 반복, 중산층 붕괴, 중국의 부상에 무방비, 제조업 공동화 등이 그것입니다. 이것이 오늘날 "포스트 신자유주의"로의 전환 논의가 벌어지는 배경입니다(5주차 2강 Post-Neoliberal Imperative).`,
        critiques: {
          theory2: {
            name: '경제적 자유주의(내부 논쟁)',
            content: `자유주의 내에서도 신자유주의에 대한 비판이 존재합니다. 케인즈주의적 자유주의자들은 레이건·대처의 정책이 지나치게 극단적이었다고 봅니다.

레이건은 탈규제를 선언했지만 실제로 국방예산은 역대 최대로 늘렸습니다. 이것은 일관된 자유주의 원칙이 아닙니다. 또한 금융 규제의 불완전한 해체가 투기를 조장하고 결국 2008년 금융위기로 이어졌습니다. 순수한 자유시장이 작동했다면 이런 거품은 덜 심각했을 것입니다.

포스트 신자유주의 논의는 "시장은 모든 것을 알아서 한다"는 단순화를 거부하고, 시장의 실패를 보완하는 정부의 역할을 재인식하는 것에서 출발합니다. 이는 자유주의의 포기가 아니라 더 세련된 자유주의로의 발전입니다.`
          },
          theory2b: {
            name: '중상주의',
            content: `중상주의 관점에서 신자유주의의 가장 큰 실수는 국가의 산업정책 역량을 스스로 해체한 것입니다.

"시장에 맡기면 된다"는 신자유주의 이념 아래 미국의 제조업 기반이 공동화됐습니다. 기업들이 더 저렴한 생산지(중국, 멕시코 등)로 이전하도록 내버려뒀고, 이로 인해 중국의 제조업 역량이 폭발적으로 성장했습니다. Friedberg(3주차 2강)가 지적하듯이, 이는 미국이 스스로 중국에게 산업 역량을 이전해준 것과 같습니다.

CHIPS Act, IRA 같은 오늘날의 산업정책으로의 복귀는 신자유주의의 실수를 인정하는 것입니다.`
          }
        }
      }
    }
    ,,{
      id:'tl-025',year:'1984',yn:1984,loc:'미국 캘리포니아',
      title:'도요타·GM NUMMI 합작 — 삼각외교의 실전',tag:'TNC·FDI',theory:'liberalism',tc:'l',
      summary:'일본 자동차의 관세 뛰어넘기 전략 + 도요타 생산방식의 미국 이전 — TNC 삼각외교의 교과서적 사례',
      bg:'1970년대 일본 자동차(도요타·혼다·닛산)가 연비 효율을 앞세워 미국 시장을 급격히 잠식했습니다. 미국 자동차 3사(GM·포드·크라이슬러)가 심각한 타격을 받자, 미국 의회는 일본산 자동차에 높은 관세를 부과하겠다고 압박했습니다. 이에 일본 정부와 기업들은 자발적 수출 규제(VERs)를 시행하면서 동시에 미국 내 현지 생산이라는 대안을 모색했습니다.',
      content:`NUMMI(New United Motor Manufacturing, Inc.) 설립:

1984년, 도요타와 GM이 캘리포니아 프리몬트 공장에 50:50 합작 회사를 설립합니다.

도요타의 목적:
• 미국 내 생산으로 관세·무역 규제 완전 우회 ("관세 뛰어넘기", tariff jumping)
• 미국 노동 환경과 노조에서 TPS(Toyota Production System) 작동 가능성 실증
• 미국 정치적 압력에 대한 선제적 대응

GM의 목적:
• 도요타의 린 생산방식(Toyota Production System) 직접 학습
• 1982년 폐쇄된 프리몬트 공장 재가동으로 정치적 부담 해소
• 일본식 품질 관리와 노사 관계 모델 습득

결과:
NUMMI는 같은 노동자가 같은 공장에서 도요타 방식으로 일하자 생산성이 40%, 불량률이 85% 감소했습니다. "문제는 노동자가 아니라 시스템이었다"는 것을 증명했습니다.

교재 Ch.17이 명시하는 삼각외교의 실제:
국가-기업-기업의 3자 협상. 미국(무역 압력) → 일본 정부(VER 시행) → 도요타(현지 생산) → GM(기술 이전)으로 이어지는 복잡한 이해관계의 산물입니다.`,
      result:'NUMMI는 2010년 GM이 파산하면서 폐쇄됐지만, 이 공장에서 일했던 엔지니어 일부가 Tesla 창업팀에 합류해 같은 공장을 인수했습니다. 도요타 생산방식(린 제조)은 이후 전 세계 제조업의 표준이 됐습니다. 교재 Ch.17은 이 사례를 삼각외교(국가-기업-기업 관계)의 대표 사례로 인용합니다.',
      c1:{n:'중상주의',c:'중상주의자들은 NUMMI를 보호무역 압력이 실질적 성과(현지 고용·생산)를 만들어낸 사례로 봅니다. 미국이 관세 위협을 하지 않았다면 도요타는 일본에서 계속 생산하며 수출했을 것입니다. 국가가 TNC에 압력을 가함으로써 일자리와 기술을 자국으로 끌어들인 것입니다. 그러나 결과적으로 도요타가 GM보다 훨씬 더 많이 배워갔다는 점에서, 과연 미국이 협상을 잘 한 것인지는 의문입니다.'},
      c2:{n:'구조주의',c:'구조주의는 NUMMI의 이면을 봅니다. 미국 남부 비노조 지역에 집중된 일본 자동차 공장들은 의도적으로 노조 조직화를 어렵게 만드는 지역을 선택했습니다. NUMMI는 예외적으로 기존 UAW 노조를 유지했지만, 린 생산방식은 노동자를 더 강도 높게 착취하는 메커니즘이라는 비판도 있습니다. "팀 시스템"과 "가이젠(개선)" 문화가 노동자들이 스스로 생산성 압박을 내면화하도록 만든다는 것입니다.'}

      title: '플라자합의',
      location: '미국 뉴욕',
      primaryTheory: 'mercantilism',
      tag: '환율 조작',
      detail: {
        background: `1980년대 초 레이건 행정부의 고금리 정책은 달러를 강세로 만들었습니다. 달러가 강세면 미국 수출품 가격이 올라 경쟁력이 낮아지고, 수입품 가격은 낮아져 수입이 늘어납니다. 그 결과 미국의 무역적자가 폭발적으로 커졌습니다. 특히 일본에 대한 무역적자가 심각했습니다—일본 자동차, 전자제품이 미국 시장을 잠식했습니다.`,
        content: `1985년 9월, 미국은 G5 국가들(영국, 서독, 프랑스, 일본)을 뉴욕 플라자호텔로 불러 협정을 체결했습니다. 핵심 내용은 달러 가치를 낮추기 위해 각국 중앙은행이 공동으로 외환시장에 개입한다는 것이었습니다.

플라자합의 이후 2년 만에 달러는 엔화 대비 약 50% 절하되었습니다. 반대로 엔화는 달러 대비 두 배 가까이 절상되었습니다. 이것은 사실상 일본이 자국 수출 경쟁력을 50% 가까이 포기하도록 강요받은 것이나 마찬가지였습니다.

급격한 엔화 절상으로 수출이 타격을 받은 일본 기업들은 국내에서 투자처를 찾지 못하고 부동산과 주식에 투기하기 시작했습니다. 1980년대 후반 일본 부동산·주식 거품이 형성됐고, 1991년 거품이 붕괴하면서 "잃어버린 20년"이 시작됩니다.`,
        result: `플라자합의는 두 가지 중요한 교훈을 남겼습니다.

첫째, 패권국(미국)은 자국 이익을 위해 동맹국에게도 불리한 협정을 강요할 수 있다는 것입니다. 일본은 안보를 미국에 의존했기 때문에 이 요구를 거부할 수 없었습니다.

둘째, 급격한 환율 절상은 해당국 경제에 심각한 후유증을 남길 수 있습니다. 중국이 위안화 절상 압박에 강하게 저항하는 것은 일본의 선례를 학습한 결과입니다. 교재 Ch.7에서 직접 이 연결고리를 언급합니다.`,
        critiques: {
          theory2: {
            name: '경제적 자유주의',
            content: `자유주의자들은 플라자합의가 시장 원리를 심각하게 왜곡했다고 비판합니다.

환율은 시장에서 결정되어야 합니다. 정치적 협상으로 강제된 환율 조정은 시장 신호를 무력화하고 경제 주체들의 계산을 교란합니다. 급격한 엔화 절상이 일본 기업들을 내수 투기로 몰아넣어 역사적 부동산 거품을 만든 것이 그 결과입니다.

미국의 무역적자 문제는 사실 환율보다는 미국 자체의 저저축·과소비 구조에 있습니다. 일본의 환율을 올려봤자 미국인들이 저축을 늘리지 않으면 다른 나라에서 더 많이 수입하게 될 뿐입니다. 근본 문제를 해결하지 않고 동맹국에 부담을 전가한 것입니다.`
          },
          theory3: {
            name: '구조주의',
            content: `구조주의는 플라자합의를 달러 패권이 경쟁국 약화의 무기로 사용된 사례로 봅니다.

국제 통화·금융 체제는 표면상 다자주의를 표방하지만, 실제로는 패권국의 이익을 관철하는 구조입니다. 미국은 자국의 무역 경쟁력을 회복하기 위해 동맹국(일본)의 경제를 희생시켰고, 이는 미국이 제공하는 안보 우산에 의존하는 일본이 거부하기 어려운 상황을 이용한 것입니다.

중국이 위안화 절상 압박에 저항하는 것은 일본의 경험에서 배운 것입니다. 그러나 중국이 1.5조 달러의 미국 국채를 보유하고 있어 미국도 강경하게 압박하기 어렵다는 구조적 상호의존이 형성되어 있습니다. 이것이 Cui bono? 분석이 보여주는 복잡성입니다—양국의 자본 계급이 이 구조에서 각각 이익을 얻기 때문에 근본적 변화가 어렵습니다.`
          }
        }

    {

      location: '멕시코·라틴아메리카',
      primaryTheory: 'structuralism',
      tag: '부채위기',
      detail: {
        background: `1970년대 OPEC 오일쇼크로 산유국들에 막대한 석유달러가 집중됩니다. 이 돈은 서방 대형 은행(씨티뱅크·체이스맨해튼 등)에 예치되었고, 은행들은 이자 수익을 위해 개발도상국(특히 라틴아메리카)에 대규모로 대출을 해줬습니다. 교재 Ch.8: "1978~1979년 사이 개발도상국들에 대한 총부채 규모는 1,000억달러에서 6,000억달러로 여섯 배 가량 급등했습니다." 개도국들은 원자재 수출 호황과 낮은 금리에 자신감을 가지고 과도하게 차입했습니다.`,
        content: `1982년 8월, 멕시코 재무장관이 국제 채권자들에게 달러 부채를 상환할 수 없다고 선언합니다. 이것이 국제 부채위기의 시작입니다.

IMF의 구제금융 조건 — 구조조정 프로그램(SAPs):
• 재정 긴축: 정부 지출 대폭 삭감 (사회복지·교육·의료)
• 통화 평가절하
• 공기업 민영화
• 무역 자유화 (수입 장벽 제거)
• 금리 인상 (인플레이션 억제)

이 처방의 결과:
• 단기: 인플레이션 억제, 국제수지 개선
• 장기: 실질임금 하락, 빈곤 심화, 경기침체 악화
• 라틴아메리카 1980년대 = "잃어버린 10년(Lost Decade)"

교재 Ch.8 핵심 비판: "점차 의견이 모아지고 있는 것은 경제적 자유주의자들이 제시한 워싱턴 컨센서스의 긴축정책과 구조조정에 기초한 부채위기 해결책이 효과가 없을 뿐 아니라 오히려 경제회복을 지연시킬 수 있다는 점이다."`,
        result: `부채위기는 개도국과 국제 금융기구 간의 힘의 불균형을 적나라하게 드러냈습니다. 교재 Ch.8의 핵심 명제: "금융위기는 항상 자원의 재분배를 둘러싼 투쟁을 야기한다. 국가가 채택한 개혁조치들로 인해 일부 사회집단은 커다란 혜택을 누리는 반면 또 다른 사회집단들은 꿈을 잃게 된다."`,
        critiques: {
          theory2: {
            name: '경제적 자유주의',
            content: `자유주의 내에서도 해석이 갈립니다. 신자유주의적 관점: 개도국이 과도한 차입과 비효율적 투자를 한 것이 근본 원인이며, IMF의 처방이 장기적으로 필요한 구조 개혁을 촉진했다고 봅니다.

케인즈주의적 비판: IMF의 긴축 처방은 위기를 더 악화시켰습니다. 스티글리츠(Stiglitz) 전 세계은행 수석경제학자는 IMF가 교과서적 처방을 맹목적으로 적용했다고 강하게 비판했습니다. 위기 상황에서 정부 지출을 줄이면 경기침체가 더 깊어진다는 케인즈의 통찰이 무시된 것입니다.`
          },
          theory3: {
            name: '중상주의',
            content: `중상주의는 부채위기가 자본 이동을 무방비로 개방한 결과라고 봅니다. 국가가 자본 이동을 통제하고 외채 규모를 전략적으로 관리했다면 이런 충격은 훨씬 작았을 것입니다.

IMF의 구조조정 처방이 실제로는 개도국 시장을 서방 자본에 개방하고 국가 자산을 헐값에 민영화하도록 강요하는 효과를 낳았다는 비판도 중요합니다. 국가가 자국 금융과 산업을 전략적으로 보호하는 역량이 부채위기 때 얼마나 중요한지를 보여주는 사례입니다.`
          }
        }
      }

    ,,{
      id:'tl-026',year:'1992',yn:1992,loc:'유럽',
      title:'ERM 위기 — 소로스의 파운드화 공격',tag:'금융투기',theory:'structuralism',tc:'s',
      summary:'"영란은행을 이긴 남자" — 투기 자본이 국가 통화 정책을 굴복시킨 역사적 사건',
      bg:'1990년대 초 유럽은 마스트리히트 조약(1992)으로 경제통화동맹(EMU) 창설을 향해 나아가고 있었습니다. 이를 위해 유럽환율메커니즘(ERM)에 참여한 국가들은 통화 가치를 일정 범위 내에서 유지해야 했습니다. 영국 파운드화는 1990년 ERM에 가입했지만, 독일이 통일 비용으로 고금리 정책을 유지하는 동안 영국은 경기침체로 저금리가 필요한 상황이었습니다—구조적 모순이었습니다.',
      content:`1992년 9월 16일 — "검은 수요일(Black Wednesday)":

조지 소로스(George Soros)의 퀀텀 펀드는 영국 파운드화가 ERM 하한선 아래로 떨어질 것을 예상하고, 총 100억달러 규모의 파운드화 공매도 포지션을 구축했습니다.

영란은행의 방어:
• 파운드화 매입 개입 (약 270억달러 소진)
• 금리를 하루 만에 10% → 12% → 15%로 급인상 (경기침체에 역행)
• 그럼에도 파운드화 가치 방어 실패

결과:
• 영국, ERM에서 탈퇴 선언
• 파운드화 15% 폭락
• 소로스 하루 만에 약 10억달러 수익 — "영란은행을 이긴 남자"로 명성
• 이탈리아 리라화도 동반 폭락하며 ERM 탈퇴

파급 효과:
이 사건은 자유로운 자본 이동이 국가 통화 주권을 무력화할 수 있음을 세계에 각인시켰습니다. 1997년 아시아 금융위기 때 같은 패턴이 반복됩니다.`,
      result:'ERM 위기는 자본 이동 자유화의 위험성에 대한 중요한 교훈을 남겼습니다. 역설적으로, ERM 탈퇴 이후 파운드화 약세가 영국 수출 경쟁력을 높여 1990년대 경제 회복을 이끌었습니다—"검은 수요일이 사실은 영국 경제에 도움이 됐다"는 평가도 있습니다. 이 사건은 유럽의 단일 통화 프로젝트(유로화)를 오히려 가속화시켰습니다.',
      c1:{n:'경제적 자유주의',c:'자유주의 내에서도 해석이 갈립니다. 신자유주의적 관점: 소로스의 공격은 영국 파운드가 ERM 내에서 과대평가되어 있다는 시장의 올바른 신호였습니다. ERM이라는 인위적 구조가 문제였지 자본 이동 자유화가 문제는 아닙니다. 반면 케인즈주의적 관점: 투기 자본이 실물 경제와 무관하게 국가 정책을 왜곡할 수 있음을 보여주므로, 토빈세(금융 거래세) 같은 자본 이동 규제가 필요합니다.'},
      c2:{n:'중상주의',c:'중상주의는 ERM 위기를 통화 주권 포기의 위험성을 보여주는 사례로 봅니다. 영국이 독자적 통화 정책을 유지할 수 없는 ERM에 가입한 것 자체가 실수였습니다. 국가 이익을 위해서는 통화 주권을 유지해야 합니다. 이 사건은 나중에 영국이 유로화 가입을 거부하는 데 중요한 심리적 배경이 됐습니다. 2016년 브렉시트의 역사적 전주곡이기도 합니다.'}
    }
    ,,{
      id:'tl-027',year:'1994',yn:1994,loc:'멕시코',
      title:'멕시코 페소 위기(테킬라 위기) + NAFTA 출범',tag:'금융위기·FTA',theory:'liberalism',tc:'l',
      summary:'자유무역과 금융 자유화의 동시 충격 — NAFTA 출범과 함께 페소화가 폭락한 역설',
      bg:'1994년은 멕시코에게 극적인 해였습니다. 1월 1일 NAFTA(북미자유무역협정)가 발효되어 미국·캐나다·멕시코 3국 자유무역 시대가 열렸습니다. 그러나 같은 날 치아파스 주에서 NAFTA에 반대하는 사파티스타 농민 반란이 일어났습니다. 그리고 연말, 페소화가 폭락하며 "테킬라 위기"가 닥쳤습니다.',
      content:`페소 위기의 원인:

구조적 취약성:
• 달러에 페그된 고정환율로 페소화 과대평가 → 경상수지 적자 누적
• 단기 외채(테소보노스) 과도 발행 — 달러 연동 단기채
• 정치적 불안: 살리나스 대통령 암살 미수, PRI 후보 피살

촉발 요인:
• 12월 20일, 새 정부가 갑작스럽게 페소화 15% 평가절하 발표
• 외국 투자자들 일제히 자금 인출 → 외환보유고 고갈 → 변동환율제 전환
• 페소화 결국 50% 폭락

미국의 개입:
클린턴 행정부가 의회 동의 없이 대통령 긴급 행정 명령으로 200억달러 구제금융 지원 (IMF 175억달러 포함 총 500억달러). 조건: IMF 구조조정 프로그램 수용.

NAFTA와 멕시코 농민:
교재 Ch.6 직접 인용: "1994년부터 2010년에 걸쳐 농업부문에서 200만 명이, 특히 저렴한 미국산 옥수수의 수입으로 인해 일자리를 잃었다." NAFTA의 자유화가 멕시코 영세농에게 파괴적 영향을 미쳤습니다.`,
      result:'테킬라 위기는 이후 아시아 금융위기(1997)의 예고편이었습니다. 동일한 패턴—달러 페그, 단기 외채 과잉, 갑작스러운 자본 유출—이 반복됩니다. NAFTA는 멕시코의 제조업(마킬라도라)을 성장시켰지만 농업 공동화와 불평등 심화라는 부작용도 낳았습니다. 오늘날 미국 이민 문제의 구조적 배경 중 하나입니다.',
      c1:{n:'중상주의',c:'중상주의자들은 멕시코 페소 위기를 금융 자유화의 위험성을 보여주는 증거로 봅니다. 자본 이동을 통제했더라면 외국 투자자들의 갑작스러운 이탈이 불가능했을 것입니다. NAFTA에 대해서는: 클린턴이 멕시코에 NAFTA 가입을 압박한 것은 멕시코를 미국의 경제적 영향권에 확실히 묶어두기 위한 전략적 목적이었습니다. 교재 Ch.6: 클린턴은 "일본에 앞서 미국이 멕시코를 뚫어 시장을 확보할 수 있어야 한다"고 말했습니다.'},
      c2:{n:'구조주의',c:'구조주의는 테킬라 위기를 신자유주의 구조조정이 가져온 필연적 결과로 봅니다. IMF의 처방—고금리, 재정 긴축, 추가 자유화—은 멕시코 노동자와 빈곤층에 비용을 전가했습니다. 구제금융은 결국 미국 금융기관(테소보노스 보유자)의 손실을 멕시코 납세자와 국제 기구 자금(세계 각국 납세자)이 부담하는 구조였습니다. NAFTA는 멕시코 자본가와 미국 기업에게는 이익이었지만 멕시코 농민과 미국 제조업 노동자에게는 손해였습니다.'}
    }

    {
      id: 'tl-008',
      year: '1997~1998',
      yearNum: 1997,
      title: '아시아 금융위기',
      location: '태국·동아시아',
      primaryTheory: 'structuralism',
      tag: '금융위기',
      detail: {
        background: `1990년대 동아시아는 "아시아의 기적"으로 불렸습니다. 태국, 인도네시아, 말레이시아, 한국 등이 빠른 경제 성장을 구가했고, 투자자들은 앞다퉈 자금을 이 지역에 투자했습니다. 그런데 이 성장의 이면에는 위험한 구조가 있었습니다.

단기 외화 대출로 장기 투자를 하는 미스매치, 부동산·주식 시장의 과열, 고정환율제 유지를 위한 외환 소진, 기업과 은행의 과도한 부채가 쌓이고 있었습니다.`,
        content: `1997년 7월, 국제 투기 자본이 태국 바트화를 집중 공격했습니다. 조지 소로스가 이끄는 헤지펀드 등이 바트화 가치 하락에 베팅했습니다. 태국 중앙은행이 외환보유고를 소진하며 방어하다 결국 1997년 7월 2일 변동환율제로 전환했고 바트화는 폭락했습니다.

위기는 도미노처럼 인도네시아, 말레이시아, 필리핀, 한국으로 확산됐습니다. 외국 투자자들이 일제히 자금을 빼가면서 통화가치가 폭락하고 주식시장이 붕괴했습니다.

IMF의 역할이 논란이 되었습니다. IMF는 구제금융 지원 조건으로 고금리 유지, 재정 긴축, 금융기관 구조조정을 요구했습니다. 그런데 이 처방이 오히려 경기를 더 악화시켰다는 비판이 제기됐습니다—위기 상황에서 금리를 올리면 기업 대출 부담이 증가하고 투자가 더 위축됩니다.

말레이시아의 마하티르 총리는 IMF 처방을 거부하고 자본 이동 통제를 실시하면서 나름대로 위기를 관리했습니다. 나중에 보면 말레이시아의 회복이 IMF 처방을 따른 태국보다 빠르지 않았다는 논란이 있습니다.`,
        result: `아시아 금융위기는 자유로운 국제 자본 이동의 위험성을 세계에 각인시켰습니다. 단기 자금의 급격한 유출입이 건실한 실물 경제도 파괴할 수 있음을 보여줬습니다.

한국은 1997년 12월 IMF 구제금융을 요청하면서 대규모 구조조정을 거쳤습니다—대기업 구조조정, 금융기관 합병, 노동 유연화. 이 과정에서 많은 사람들이 일자리를 잃었습니다. 한국 사회에서 'IMF 사태'는 트라우마로 남아 있습니다.`,
        critiques: {
          theory2: {
            name: '경제적 자유주의(찬반)',
            content: `자유주의 내에서도 아시아 금융위기 해석이 갈립니다.

신자유주의적 관점: 위기의 근본 원인은 도덕적 해이(moral hazard)와 정경유착(crony capitalism)이었습니다. 정부가 특정 기업에 특혜를 주고 부실 기업도 망하지 않을 것이라는 기대가 무분별한 차입을 낳았습니다. IMF의 처방은 이런 구조적 왜곡을 바로잡기 위한 불가피한 수술이었습니다.

케인즈주의적 비판: IMF의 긴축 처방은 위기를 더 악화시켰습니다. 위기 상황에서 정부 지출을 줄이면 경기침체가 더 깊어집니다. 고금리 유지는 기업 부담을 늘려 파산을 가속시켰습니다. 스티글리츠(Joseph Stiglitz) 같은 경제학자들은 IMF가 교과서적 처방을 맹목적으로 적용했다고 비판했습니다.`
          },
          theory2b: {
            name: '중상주의',
            content: `중상주의는 아시아 금융위기가 자본 이동을 무방비로 개방한 결과라고 봅니다.

아시아 국가들은 신자유주의 원칙에 따라 자본 계정을 자유화했습니다. 그 결과 단기 투기 자금이 몰려들었고, 위기 조짐이 보이자 하루아침에 빠져나갔습니다. 국가가 자본 이동을 통제하고 있었다면 이런 충격은 없었을 것입니다.

말레이시아 마하티르가 IMF 처방을 거부하고 자본 통제를 실시한 것이 맞는 선택이었다는 주장이 이후 많은 연구에서 지지됩니다. 시장 자유화보다 국가의 전략적 관리가 더 효과적이라는 것입니다.`
          }
        }
      }
    }

      id:'tl-028',year:'1999',yn:1999,loc:'미국 시애틀',
      title:'시애틀 반WTO 시위 + 글래스-스티걸법 폐지',tag:'반세계화·금융규제',theory:'structuralism',tc:'s',
      summary:'"Battle in Seattle" — 반세계화 운동의 정점, 그리고 금융위기의 씨앗이 된 탈규제',
      bg:'1999년은 두 가지 상반된 사건으로 기억됩니다. 11월, 시애틀 WTO 각료회의에서 역사상 최대 규모의 반세계화 시위가 벌어졌습니다("Battle in Seattle"). 같은 해 미국 의회는 1933년 대공황의 교훈으로 만들어진 글래스-스티걸법을 폐지했습니다—2008년 금융위기의 씨앗이 뿌려진 순간입니다.',
      content:`① 시애틀 WTO 각료회의 붕괴 ("Battle in Seattle"):
노동조합, 환경단체, NGO 등 5만~10만 명이 집결. 최루가스와 경찰 진압, 비상계엄 선포. 시위대는 다양한 요구를 내세웠습니다: 노동 기준, 환경 보호, 개도국 권리, WTO 결정의 투명성.

결과: 각료회의 완전 결렬. 교재 Ch.6: "'배볼 인 시애틀'은 노동착취를 통한 인권의 침해, 거대 자본주의식 기업이 환경에 미치는 영향, 개발도상국에서의 기업식농업, WTO 내 결정과정의 투명성 부족에 대해 걱정하는 반세계화 운동가들의 슬로건이 되었다."

② 글래스-스티걸법(Glass-Steagall Act) 폐지:
1933년 대공황 직후 제정된 이 법은 상업은행(예금·대출)과 투자은행(증권)의 업무를 엄격히 분리했습니다. 은행이 고위험 투기에 고객 예금을 사용하지 못하도록 하는 방화벽이었습니다.

1999년 그램-리치-블라일리법으로 이 분리 장벽이 폐지됩니다. 시티그룹(상업은행+투자은행 결합)의 합법화가 직접적 목적이었습니다. 이후 은행들이 서브프라임 모기지와 복잡한 파생상품에 고객 예금을 투입할 수 있게 됩니다—2008년 금융위기의 구조적 원인.`,
      result:'시애틀 시위는 이후 도하 라운드(2001)를 "개발 라운드"로 명명하게 만들 만큼 WTO의 의제에 영향을 미쳤습니다. 그러나 글래스-스티걸법 폐지는 9년 후 역사상 가장 큰 금융위기로 귀결됐습니다. 오바마 행정부의 도드-프랭크법(2010)이 일부 규제를 복원했지만, 트럼프 행정부에서 다시 완화됐습니다.',
      c1:{n:'경제적 자유주의',c:'자유주의 내에서도 글래스-스티걸법 폐지에 대한 평가가 엇갈립니다. 신자유주의적 관점: 금융 혁신을 위해 불필요한 규제를 제거한 것이며, 2008년 위기의 원인은 정부의 주택 촉진 정책(패니매·프레디맥)이지 탈규제가 아닙니다. 케인즈주의적 관점: 금융 탈규제가 과도한 위험 추구를 허용해 위기를 만들었습니다. 시장 실패를 보정하는 규제가 필요합니다. 시애틀 시위에 대해서는: 무역 자유화는 옳지만 그 혜택이 더 넓게 분배되도록 보완 정책이 필요합니다.'},
      c2:{n:'중상주의',c:'중상주의는 시애틀 시위를 WTO가 특정 국가(선진국)의 이익을 위한 도구임이 드러난 사건으로 봅니다. 개도국들도 협상에서 배제당했다고 느꼈고, 이후 G20 개도국 블록이 형성됩니다. 글래스-스티걸법 폐지에 대해서는: 금융 자유화가 국가의 금융 시스템 통제력을 약화시킨 것이 문제입니다. 국가가 핵심 금융 기관에 대한 감독과 통제를 유지해야 합니다.'}
    }

    {
      id: 'tl-009',
      year: '2001',
      yearNum: 2001,
      title: '중국의 WTO 가입과 제1차 China Shock',
      location: '중국·전 세계',
      primaryTheory: 'mercantilism',
      tag: '무역·산업',
      detail: {
        background: `2001년 11월, 중국이 세계무역기구(WTO)에 가입했습니다. 이것은 단순한 무역 협정이 아니라 세계 경제의 구조를 바꾼 역사적 사건이었습니다. 서방은 중국의 WTO 가입이 중국을 자유주의 국제 경제 질서에 편입시키고, 이것이 중국의 민주화로 이어질 것이라고 기대했습니다.

하지만 그 기대는 실현되지 않았습니다.`,
        content: `WTO 가입 이후 중국의 제조업 수출이 폭발적으로 증가했습니다. 이것이 "China Shock(차이나 쇼크)"입니다—경제학자 오토르(David Autor) 등의 연구에 따르면, 중국 수입 증가로 인해 2000년부터 2007년 사이에만 미국에서 200만~240만 개의 제조업 일자리가 사라졌습니다.

중국이 WTO 가입 과정에서 약속한 것들—보조금 철폐, 시장 접근 확대, 불공정 무역관행 시정—이 제대로 이행되지 않았다는 비판이 커졌습니다. 중국은 국유기업 보조금을 지속했고, 환율을 저평가 상태로 유지했으며, 외국 기업에 대한 기술 이전 강요는 더 심해졌습니다.

서방의 믿음이 틀렸음을 Friedberg(3주차 2강)는 이렇게 설명합니다: Xi와 CCP는 서방 경제학자들이 생각하는 방식으로 경제를 보지 않는다. 그들에게 경제는 효율이나 번영의 문제가 아니라 권력의 문제입니다—CCP의 지배를 공고히 하고 중국의 군사·기술 역량을 키우는 수단입니다.`,
        result: `미국과 유럽의 제조업 공동화, 중국 제조업 패권의 급격한 부상, 러스트 벨트(미국 쇠퇴 제조업 지역)의 고통이 포퓰리즘 정치의 자양분이 되었습니다. 트럼프의 등장은 이 구조적 변화의 정치적 결과입니다.

2015년 Made in China 2025 발표로 중국은 더 나아가 첨단 제조업 패권도 노리기 시작했고, 이것이 제2차 China Shock의 우려를 낳고 있습니다.`,
        critiques: {
          theory2: {
            name: '경제적 자유주의',
            content: `자유주의자들은 중국의 WTO 가입이 기본적으로 옳은 방향이었다고 봅니다. 중국의 글로벌 분업 참여로 세계 전체적으로 생산 효율이 높아졌고, 소비자들은 더 저렴한 상품을 누렸습니다.

문제는 중국이 WTO 규칙을 제대로 지키지 않은 것이며, 해결책은 자유무역을 포기하는 것이 아니라 WTO 분쟁해결 메커니즘을 강화하고 중국이 약속을 지키도록 압박하는 것입니다.

일자리 손실에 대해서는, 무역으로 혜택을 보는 소비자들이 일자리를 잃은 노동자들에게 보상하는 전환 지원 프로그램이 충분했어야 합니다. 문제는 자유무역 자체가 아니라 그 이익의 분배 방식입니다.`
          },
          theory3: {
            name: '구조주의',
            content: `구조주의는 China Shock의 진짜 피해자가 미국 노동자만이 아니라 중국 노동자이기도 하다고 봅니다.

중국의 수출 제조업이 성장하면서 농촌 노동자(농민공)들이 도시 공장으로 몰려들었습니다. 이들의 낮은 임금이 중국 제조업 경쟁력의 토대였습니다. "중국 경제의 기적"이 실은 수억 명 농민공의 저임금 노동 위에 서 있었던 것입니다.

WTO 체제가 만든 세계 분업 구조에서 이익을 얻은 것은 미국과 중국 양쪽의 자본가 계급입니다. 미국 대기업들은 중국의 저임금 노동력을 활용해 이윤을 늘렸고, 중국 정부·기업도 막대한 이익을 거뒀습니다. 미국 노동자와 중국 농민공은 모두 이 구조의 피해자입니다.`
          }
        }
      }
    }
    ,,{
      id:'tl-029',year:'2001',yn:2001,loc:'아르헨티나',
      title:'아르헨티나 디폴트 — 역사상 최대 채무불이행',tag:'부채위기',theory:'structuralism',tc:'s',
      summary:'1,000억달러 디폴트, 대통령 5명 2주 교체 — IMF 워싱턴 컨센서스의 실패',
      bg:'1991년 아르헨티나는 하이퍼인플레이션을 잡기 위해 페소화를 달러에 1:1로 고정하는 태환제(Currency Board)를 도입했습니다. 초기에는 성공적이었습니다—인플레이션이 잡히고 외국인 투자가 몰려왔습니다. 그러나 1990년대 후반 브라질 헤알화 폭락, 글로벌 자본의 신흥국 이탈이 이어지면서 아르헨티나 경제가 흔들리기 시작했습니다.',
      content:`위기의 전개:

구조적 문제:
• 달러 페그로 인한 페소화 과대평가 → 수출 경쟁력 상실
• IMF 조건에 따른 긴축 정책 → 경기침체 심화
• 재정 적자 누적 → 외채 급증

폭발 (2001년 12월):
• IMF의 추가 지원 거부 → 자본 이탈 가속
• 정부, 은행 예금 인출 제한 ("코랄리토", 주 1,250달러 상한)
• 전국 냄비 시위(cacerolazo): 시민들이 냄비를 두드리며 항의
• 2주 동안 대통령 5명 교체
• 2002년 1월: 역사상 최대 규모(1,000억달러) 채무불이행 선언
• 달러 페그 포기, 페소화 75% 폭락

교재 Ch.8: "두 나라의 주식시장과 통화가치가 폭락하였으며, 이들은 대외부채에 대한 채무불이행을 선언하지 않을 수 없었다"(1998 러시아와 2001 아르헨티나).`,
      result:'디폴트 이후 아르헨티나는 채권자들과 협상해 부채의 65~70%를 탕감받았습니다. 페소화 약세로 수출 경쟁력이 회복되면서 2003~2008년 연평균 8% 이상 성장했습니다. 이것은 IMF 처방(긴축)보다 디폴트와 평가절하가 더 빠른 회복을 가능하게 한 사례로, 이후 그리스 사태 논쟁에서 자주 인용됩니다.',
      c1:{n:'경제적 자유주의',c:'자유주의 내부에서도 아르헨티나 위기의 원인에 대한 논쟁이 있습니다. 신자유주의적 관점: 아르헨티나 정부가 달러 페그를 유지하면서도 재정 규율을 지키지 않은 것이 문제입니다. 진정한 태환제는 정부 지출을 외환보유고 내로 제한해야 합니다. 케인즈주의적 비판: IMF의 지속적인 긴축 요구가 경기침체를 심화시켜 오히려 세수를 줄이고 적자를 늘렸습니다. 케인즈의 말처럼, 경기침체 때 긴축하는 것은 공황기에 불을 끄려다 기름을 붓는 것입니다.'},
      c2:{n:'중상주의',c:'중상주의는 아르헨티나가 달러 페그(통화 주권 포기)를 선택한 것 자체가 실수였다고 봅니다. 국가가 독자적 통화 정책을 포기하면 외부 충격에 속수무책이 됩니다. 달러화 전면 도입이나 통화 동맹 참여는 국가 경제 자율성을 근본적으로 훼손합니다. IMF의 처방은 아르헨티나 채권자(주로 선진국 금융기관)의 이익을 위한 것이었고, 실질적 고통은 아르헨티나 국민이 감당해야 했습니다.'}
    }

    {
      id: 'tl-010',
      year: '2007~2009',
      yearNum: 2008,
      title: '글로벌 금융위기',
      location: '미국→전 세계',
      primaryTheory: 'structuralism',
      tag: '금융위기',
      detail: {
        background: `2000년대 초 미국에서 주택 가격이 계속 오를 것이라는 기대 아래 주택 담보 대출이 폭발적으로 늘었습니다. 저신용 차주들에게도 무분별하게 대출을 해주는 서브프라임 모기지(subprime mortgage)가 확산됐습니다.

금융 공학의 발전으로 이 대출들이 복잡한 금융 상품(MBS, CDO 등)으로 묶여 전 세계 투자자들에게 팔렸습니다. 위험이 분산된 것처럼 보였지만 실제로는 전 세계로 퍼졌습니다.

Alan Greenspan FRB 의장은 "금융기관의 자기 이익이 알아서 위험을 관리할 것"이라고 믿었습니다—시장 자유화와 자율 규제 신봉의 결과였습니다.`,
        content: `2006년부터 미국 주택 가격이 하락하기 시작했습니다. 2007년 대규모 모기지 채무불이행이 발생하면서 이에 노출된 금융기관들이 막대한 손실을 입었습니다. 2008년 9월 15일, 리먼 브라더스(Lehman Brothers)가 파산을 선언했습니다—역사상 최대 규모의 기업 파산이었습니다. 세계 금융 시스템이 공황 상태에 빠졌습니다.

미국 정부는 AIG(미국 최대 보험사), 패니매·프레디맥(주택담보대출기관) 등을 수조 달러의 공적 자금으로 구제했습니다. TARP(부실자산구제프로그램)를 통해 7,000억 달러가 금융기관 지원에 투입됐습니다.

위기는 전 세계로 확산됐습니다. 유럽 은행들도 미국 서브프라임 상품에 노출되어 있었고, 국제 무역이 급감하면서 수출 의존 국가들도 타격을 받았습니다.

그린스펀은 의회 청문회에서 "시장의 자기조정 능력에 대한 이념적 가정이 틀렸다"고 인정했습니다—40년간의 신자유주의 금융 철학에 대한 역사적 인정이었습니다.`,
        result: `금융위기는 신자유주의적 탈규제와 자율 규제에 대한 신화를 무너뜨렸습니다. 이후 도드-프랭크법(미국), 바젤III 등 더 강화된 금융 규제가 도입됐습니다.

동시에 이 위기는 2008년 G20 정상회의를 통한 국제 공조, 케인즈주의적 재정 부양책 부활의 계기가 되었습니다. BRICs(브라질, 러시아, 인도, 중국)는 상대적으로 피해가 덜했고, 특히 중국은 4조 위안의 대규모 부양책으로 빠르게 회복했습니다.`,
        critiques: {
          theory2: {
            name: '경제적 자유주의(내부 비판)',
            content: `자유주의 내에서 위기의 원인을 두고 논란이 있습니다.

일부 신자유주의자들은 정부의 시장 왜곡이 원인이라고 봅니다. 공동체재투자법(CRA)으로 저신용자 대출을 장려하고, 패니매·프레디맥이 정부보증으로 도덕적 해이를 조장했다는 것입니다. 순수한 자유시장이었다면 부실 기관은 정리되었을 것입니다.

그러나 케인즈주의자들은 금융 탈규제가 핵심 원인이라고 봅니다. 글래스-스티걸법 폐지(1999)로 투자은행과 상업은행 업무 구분이 사라지면서 과도한 위험 추구가 가능해졌습니다. 시장 자율에 맡기면 위험을 스스로 관리한다는 믿음이 틀렸음이 증명됐습니다.`
          },
          theory2b: {
            name: '중상주의',
            content: `중상주의는 금융 세계화와 탈규제가 국가 경제 안보를 위협한다는 점에서 위기를 비판합니다.

국가가 자국 금융 시스템을 강력하게 감독하고 국제 단기 자본 이동에 제동을 걸었어야 했습니다. 금융기관이 전 세계 복잡한 파생상품에 노출되도록 허용한 것이 국가 안보 차원의 실수였습니다.

중국은 자본 계정을 완전히 자유화하지 않아서 위기에서 상대적으로 덜 영향을 받았습니다. 국가의 전략적 판단이 시장 자유화보다 나을 수 있다는 것이 중상주의가 위기에서 이끌어내는 교훈입니다.`
          }
        }

      title:'중국의 희토류 무기화 — 경제 강압의 새 시대',tag:'경제 강압',theory:'mercantilism',tc:'m',
      summary:'센카쿠 분쟁 이후 일본에 희토류 수출 중단 — 자원이 외교·안보 무기가 되다',
      bg:'희토류(Rare Earth Elements)는 전기차 배터리, 반도체, 미사일 유도 시스템, 풍력 터빈 등 첨단 기술에 필수적인 17가지 광물입니다. 중국은 전 세계 희토류 생산의 약 80~90%를 차지하고 있습니다(2010년대 초 기준). 2010년 9월, 센카쿠 열도(중국명: 댜오위다오) 인근 해역에서 중국 어선이 일본 해안경비대 선박과 충돌하는 사건이 발생했습니다.',
      content:`중국의 대응:

즉각적 경제 강압:
일본이 중국 선장을 구금하자, 중국은 공식 발표 없이 사실상 일본에 대한 희토류 수출을 중단했습니다. 일본 기업들의 주문이 갑자기 이행되지 않기 시작했습니다.

효과:
• 일본 전자·자동차·방산 업체들 즉각 타격
• 희토류 가격 급등
• 결국 일본이 중국 선장을 석방하며 외교적으로 물러섬

파급 효과:
• 2011년: 중국, 희토류 수출 쿼터 공식 도입 (연간 30,000톤 제한)
• 2012년: 미국·EU·일본이 WTO에 공동 제소 → WTO, 중국 패소 판정
• 전 세계적으로 희토류 대체 공급원 개발 가속화
• 미국·일본·호주의 광물 공급망 다각화 협력 강화

현재적 의미:
반도체(대만 의존), 배터리(중국 의존), 희토류 등 첨단 공급망 리스크가 오늘날 경제 안보 논의의 핵심입니다. 이 사건이 그 인식의 전환점이었습니다.`,
      result:'희토류 무기화는 이후 공급망 안보(Supply Chain Security)와 경제적 강압(Economic Coercion)을 국제 정치경제의 핵심 의제로 만들었습니다. 바이든 행정부의 반도체 공급망 재편(CHIPS Act), 인도-태평양 경제 프레임워크(IPEF), 광물 안보 파트너십(MSP) 등이 모두 이 문제의식의 연장선에 있습니다.',
      c1:{n:'경제적 자유주의',c:'자유주의자들은 중국의 희토류 무기화를 WTO 규범의 명백한 위반으로 봅니다. 자원 수출 제한은 자유무역 원칙에 반합니다. 실제로 WTO가 중국 패소 판정을 내렸습니다. 해결책: WTO 분쟁 해결 절차 강화, 그리고 시장 메커니즘—가격이 오르면 대체 공급원 개발이 촉진됩니다. 실제로 중국의 희토류 무기화 이후 호주·캐나다·미국 등지의 광산 개발이 가속화됐습니다.'},
      c2:{n:'구조주의',c:'구조주의는 희토류 무기화를 중국이 세계체제에서 핵심부로 상승하면서 기존 패권(미국·일본)에 도전하는 과정으로 봅니다. 자원 의존성이 구조적 종속을 만든다는 것—일본이 느낀 것이 바로 월러스틴이 말한 불등가교환과 구조적 취약성입니다. 아이러니하게도, 서방이 중국에 희토류를 의존하게 된 것 자체가 1990년대 신자유주의 세계화의 산물입니다. 비용 효율을 추구하며 중국 생산에 집중된 결과입니다.'}
    }
    ,,{
      id:'tl-031',year:'2010',yn:2010,loc:'멕시코만',
      title:'BP 멕시코만 원유 유출 사고',tag:'TNC·환경',theory:'structuralism',tc:'s',
      summary:'역사상 최대 해양 원유 유출 — TNC가 이익은 사유화하고 비용은 사회화하는 구조의 실증',
      bg:'2010년 4월 20일, BP(British Petroleum)의 딥워터 호라이즌(Deepwater Horizon) 시추선이 멕시코만에서 폭발했습니다. 11명이 사망했고, 87일 동안 하루 약 6만 배럴의 원유가 멕시코만에 유출됐습니다. 역사상 최대 규모의 해양 원유 유출 사고입니다. 교재 Ch.17이 TNC의 사례로 직접 언급하는 사건입니다.',
      content:`사고의 구조적 배경:

규제 포획(Regulatory Capture):
미국 광물관리국(MMS)은 BP 등 석유 기업들로부터 감독해야 할 기업들과 유착 관계를 형성했습니다. 안전 검사가 형식적으로 이루어지고, 기업이 제출한 안전 계획서가 승인됐습니다.

비용 절감 압박:
딥워터 호라이즌은 당초 예산을 초과하고 일정이 지연된 상태였습니다. BP 경영진이 안전 장치(cement cap) 테스트를 생략하도록 압박했다는 증언이 나왔습니다.

피해와 비용 전가:
• 멕시코만 어업 종사자 수만 명 생계 파괴
• 루이지애나·미시시피·앨라배마·플로리다 해안 생태계 장기 피해
• BP: 최종 합의금 약 650억달러 지불 (역사상 최대 기업 벌금)
• 그러나 BP는 이후에도 세계 주요 석유 기업으로 존속

교재 Ch.17 인용: "2010년 BP의 멕시코만 석유 유출 사고에서 목격되었듯이 환경을 오염시킨다."`,
      result:'이 사고는 TNC에 대한 규제 강화 논쟁을 촉발했습니다. 오바마 행정부는 심해 시추 일시 중단 명령을 내렸고, 광물관리국을 해산·재편했습니다. 그러나 근본적 구조—TNC가 이익은 사유화하고 환경 비용은 사회화하는 구조—는 변하지 않았다는 비판이 있습니다.',
      c1:{n:'경제적 자유주의',c:'자유주의자들은 BP 사고가 자유시장의 실패가 아니라 규제 실패의 결과라고 봅니다. 시장이 제대로 작동한다면—즉, 기업이 모든 외부 비용(환경 피해)을 내부화해야 한다면—BP는 훨씬 더 신중하게 안전을 관리했을 것입니다. 해결책은 더 효과적인 책임 법제와 탄소세·오염세 같은 시장 기반 메커니즘입니다. 피구세(Pigouvian tax)를 통해 외부 비용을 가격에 반영하면 시장이 스스로 환경을 보호하게 됩니다.'},
      c2:{n:'중상주의',c:'중상주의는 BP 사고를 국가가 핵심 산업(에너지)에 대한 강력한 감독 권한을 유지해야 한다는 증거로 봅니다. 에너지 안보는 국가의 핵심 이익이며, 석유 회사에 대한 자율 규제는 국가 안보 차원에서 용납할 수 없습니다. 민영화와 탈규제가 공공 감독 역량을 약화시킨 것이 이 사고의 구조적 배경입니다. 국가가 에너지 기업에 대한 실질적 통제력을 유지했어야 했습니다.'}
    }

      title: '유로존 부채위기',

      tag: '통화통합·위기',
      detail: {
        background: `1999년 유로화 출범 이후 유럽은 단일 통화권의 혜택을 누렸습니다. 그러나 2009년 그리스가 재정 통계를 조작해 적자 규모를 숨겼다는 사실이 드러나면서 유로존 전체가 위기에 빠집니다. 교재 Ch.8: "그리스 부채위기는 유럽경제통화동맹(EMU)의 와해를 위협할 만큼 금융위기 및 은행위기를 광범위하게 야기했습니다." 이탈리아·스페인·포르투갈·아일랜드도 높은 부채로 위기를 맞았습니다.`,
        content: `위기의 구조적 원인:

• 공동 통화로 경쟁력 차이를 환율 조정으로 해결할 수 없음

ECB·IMF의 처방:

• 공무원 임금 삭감, 연금 삭감, 세금 인상

교재 Ch.8: 교재가 집필될 당시 "EMU 전체 경제가 적어도 2013년까지 지속될 것으로 예상되는 또 다른 경기침체에 빠졌다"고 기술.

6주차 2강 Top Dollar(Prasad): 유로화가 달러의 경쟁 대안으로 떠올랐지만 유로존 부채위기로 준비통화 비중이 28%(2009)에서 20% 미만으로 하락했습니다.`,
        result: `유로존 위기는 자유주의적 통화통합 프로젝트의 성과와 구조적 한계를 동시에 보여줬습니다. 재정 통합 없는 통화 통합은 위기 시 치명적 취약점을 드러냅니다. 동시에 ECB(유럽중앙은행)의 "무제한 채권 매입" 선언과 유럽 안정화 메커니즘(ESM) 설립으로 유로존은 해체되지 않고 위기를 넘겼습니다. 유로화가 달러의 대안이 되지 못하는 구조적 이유를 명확히 보여준 사례입니다.`,
        critiques: {

            content: `중상주의자들은 통화 주권 포기가 국가 자율성의 자살이라고 봅니다. 유로존 국가들은 위기 시 독자적 통화정책·환율 조정 수단을 잃었기 때문에, 그리스·이탈리아는 통화 절하 대신 내부 긴축을 강요받았습니다. 국가 이익을 지키려면 통화 주권을 유지해야 한다는 중상주의 논리가 재확인된 사례입니다.

독일이 유로화로 인위적으로 저평가된 통화 덕에 수출 경쟁력을 누리는 동안, 그리스·스페인은 고평가된 환율로 경쟁력을 잃었다는 분석도 있습니다.`

긴축 비용은 노동자·빈곤층에 전가됐고, 독일 자본은 남유럽에 자금을 빌려준 채권자로서 이익을 취했습니다. ECB·IMF의 구조조정 요구는 그리스·이탈리아 노동자 계급에 직접 타격을 가했습니다. 교재 Ch.8이 인용하는 독일 언론인 쉬닙벤의 말: "시장의 합리성 및 시장과 민주주의 공생에 대한 신뢰가 순식간에 사라졌다."`

      content:`운동의 전개:

핵심 주장:

이코노미스트지 평가 (교재 Ch.17 인용):

피케티(Thomas Piketty)의 이론적 뒷받침:
2013년 출간된 <자본과 이데올로기>는 자본 수익률(r)이 경제 성장률(g)보다 지속적으로 높으면(r>g) 불평등이 필연적으로 심화된다는 이론으로 OWS의 문제의식을 학문적으로 뒷받침했습니다.`,
      result:'OWS는 직접적인 정책 변화를 이끌어내지 못하고 경찰에 의해 해산됐지만, "1% vs 99%"라는 불평등 담론을 주류 정치로 끌어올렸습니다. 버니 샌더스, 엘리자베스 워런의 정치적 부상, 그리고 역설적으로 트럼프의 "시스템에 맞선 반란" 담론까지—OWS가 열어놓은 불평등 논의의 공간이 다양한 방향으로 전개됐습니다.',
      c1:{n:'경제적 자유주의',c:'자유주의자들은 OWS의 문제 진단에는 일부 동의하지만 해결책은 다릅니다. 불평등이 심화된 것은 사실이지만, 원인은 시장 자체보다 시장을 왜곡한 정책들(대마불사, 금융 규제 포획)에 있습니다. 해결책은 자본주의 타파가 아니라 진정한 경쟁 시장 회복입니다. 더 강력한 반독점법, 금융 투명성 강화, 그리고 교육과 직업 훈련을 통한 기회 균등이 필요합니다.'},

    {

    {
      id: 'tl-011',
      year: '2015',
      yearNum: 2015,
      title: 'Made in China 2025',
      location: '중국',
      primaryTheory: 'mercantilism',
      tag: '산업정책',
      detail: {
        background: `2008년 금융위기 이후 중국은 더 이상 저임금 제조업만으로는 지속 성장이 어렵다는 인식 하에 기술 고도화 전략을 추구했습니다. 동시에 Xi Jinping의 집권(2013~)과 함께 "중국몽"—중화민족의 위대한 부흥—이라는 국가 목표가 강화되었습니다.

2015년 국무원이 발표한 "중국제조 2025(Made in China 2025, MIC 2025)" 계획은 10대 전략 산업에서 2025년까지 글로벌 리더가 되겠다는 야심찬 목표를 담았습니다.`,
        content: `10대 전략 산업:
차세대 정보기술, 고정밀 수치제어 및 로봇, 항공우주, 해양 장비, 선진 철도 교통, 에너지 절약 및 신에너지 자동차, 전력 장비, 농업 기계, 신소재, 바이오의약 및 고성능 의료기기

목표: 각 분야에서 국내 시장 점유율과 글로벌 시장 점유율 구체적 수치 제시 (예: 국내 로봇 수요의 70%를 국산으로 충족)

수단:
• 대규모 정부 보조금 (OECD 국가 대비 3~9배 수준, Friedberg 추정)
• 환경 규제 완화
• 지방 정부·민간 기업의 부채 동원 투자
• 강제 기술 이전: 외국 기업이 중국에서 영업하려면 기술을 넘겨야 함
• 외국 기업 인수를 통한 기술 흡수

2024년 기준 목표의 86%를 달성했다는 평가가 있습니다(남중국 모닝 포스트, 정부 자료 기반).`,

중국의 전기차(BYD 등), 배터리, 태양광 패널은 이제 글로벌 시장에서 서방 기업들을 압도하고 있습니다. 이것이 Friedberg가 경고하는 제2차 China Shock의 실체입니다.

      id:'tl-034',year:'2020',yn:2020,loc:'전 세계',
      title:'COVID-19 팬데믹 — 글로벌 공급망 충격',tag:'공급망·안보',theory:'mercantilism',tc:'m',
      summary:'마스크·백신·반도체 부족이 드러낸 공급망 취약성 — 경제 안보 시대의 본격 개막',
      bg:'2020년 1월 WHO가 국제 공중보건 비상사태를 선언하고, 3월 팬데믹을 공식 선언했습니다. 전 세계 공장이 멈추고 국경이 닫히면서, 수십 년간 효율성을 추구해온 글로벌 공급망의 구조적 취약성이 일순간에 드러났습니다.',
      content:`공급망 충격의 실상:

Friedberg의 처방 (3주차 2강):
공급망 재편은 단순한 경제 효율 문제가 아닌 안보 문제입니다. 핵심 전략 물자는 동맹국 내에서 생산해야 합니다.`,
      result:'팬데믹은 경제 안보(Economic Security)를 국가 안보의 핵심 의제로 만들었습니다. "효율 최적화"에서 "복원력(resilience) 강화"로의 패러다임 전환이 일어났습니다. 바이든의 CHIPS Act, IRA, 인도-태평양 경제 프레임워크(IPEF)가 모두 이 맥락에서 등장했습니다. 신자유주의적 세계화에서 "안보 중심 세계화"로의 전환이 팬데믹으로 인해 극적으로 가속됐습니다.',

function buildTL(){
  const sc = document.getElementById('tl-scroll');
  const sorted=[...IPE_DATA.timeline].filter(ev=>ev&&ev.id&&ev.id.startsWith("tl-")).sort((a,b)=>(a.yearNum||a.yn||0)-(b.yearNum||b.yn||0));
  sorted.forEach((ev,i)=>{
    const tc = (ev.primaryTheory||ev.theory)==='mercantilism'?'m':(ev.primaryTheory||ev.theory)==='liberalism'?'l':'s';
    const wrap = document.createElement('div');
    wrap.style.cssText='display:flex;align-items:flex-start';
    const el = document.createElement('div');
    el.className='tl-ev';
    el.dataset.id=ev.id;
    el.innerHTML=`<div class="tl-yr">${ev.year}</div><div class="tl-nd n${tc}"></div><div class="tl-nm">${ev.title}</div>`;
    el.onclick=()=>toggleTL(ev.id,el);
    wrap.appendChild(el);
    if(i<sorted.length-1){
      const cn=document.createElement('div');cn.className='tl-cn';wrap.appendChild(cn);
    }
    sc.appendChild(wrap);
  });
}

// ── 항목 정규화: 기존(detail 구조) + 신규(flat 구조) 모두 지원 ──
function normalizeItem(ev){
  // 기존 항목: ev.detail.background / 신규 항목: ev.bg
  if(ev.detail){
    // 기존 구조
    const d = ev.detail;
    // critiques: {theory2:{name,content}, theory3:{name,content}} → 배열로
    return {
      location: ev.location || ev.loc || '',
      background: d.background || '',
      content: d.content || '',
      result: d.result || '',
      critiques: d.critiques || {}
    };
  } else {
    // 신규 flat 구조 (bg/content/result/c1/c2)
    const crits = {};
    if(ev.c1) crits['c1'] = {name: ev.c1.n || ev.c1.name || '', content: ev.c1.c || ev.c1.content || ''};
    if(ev.c2) crits['c2'] = {name: ev.c2.n || ev.c2.name || '', content: ev.c2.c || ev.c2.content || ''};
    return {
      location: ev.loc || ev.location || '',
      background: ev.bg || ev.background || '',
      content: ev.content || '',
      result: ev.result || '',
      critiques: crits
    };
  }
}

  return hist.map(h=>`<h3>${h.t}</h3><div style="font-size:.85rem;color:var(--text2);line-height:1.85;margin-bottom:1rem">${h.c.replace(/\n/g,'<br>')}</div>`).join('');
}
function buildCore(core){
  if(!core) return '<p>내용 없음</p>';
  if(typeof core==='string') return core;
  if(!core.length) return '<p>내용 없음</p>';
  return core.map(h=>`<h3>${h.t}</h3><div style="font-size:.85rem;color:var(--text2);line-height:1.85;margin-bottom:1rem">${h.c.replace(/\n/g,'<br>')}</div>`).join('');

function buildSubs(subs,tc){

}

}
function swTab(btn,paneId){

• 기술 이민 장려: 영국 기술자 유치 (스미스가 비판한 영국의 기술 수출 금지를 역으로 활용)

실제 결과:
미국은 1816년, 1824년, 1828년 관세법을 통해 높은 보호관세를 유지했습니다. 1880년대 미국이 세계 최대 제조업 국가로 부상한 것은 이 보호주의 정책의 직접적 결과라는 평가가 있습니다.`,
   result:'해밀턴의 보호주의 전략은 미국 제조업의 기반을 닦아 19세기 후반 세계 최대 산업국 도약의 토대가 됐습니다. 아이러니하게도 이후 미국은 자유무역의 챔피언을 자처하며 다른 나라들에게 자유화를 요구했습니다 — 리스트가 비판한 "사다리 걷어차기"의 전형입니다.',
   c1:{n:'경제적 자유주의',c:'자유주의자들은 해밀턴의 논리가 정치적으로 매력적이지만 경제적으로는 비효율을 낳는다고 봅니다. 보호받는 산업은 경쟁 없이 비효율에 안주하고 소비자는 더 비싼 제품을 구매해야 합니다. 또한 어떤 산업을 전략적으로 선정할지 정부가 올바르게 판단할 수 있다는 보장이 없습니다. 시장이 더 잘 압니다.'},
   c2:{n:'구조주의',c:'구조주의는 해밀턴의 논리를 지지하면서도 그 수혜자를 묻습니다. 미국 제조업 보호는 북부 산업 자본가들의 이익을 위한 것이었고, 남부 농장주들과 소비자들이 비용을 부담했습니다. "국가 이익"이라는 이름 아래 특정 계급의 이해가 관철된 사례입니다.'}
  },

  {id:'tl-037',year:'1972',yn:1972,loc:'미국·중국',
   title:'닉슨의 중국 방문 — 지정학적 삼각외교',
   tag:'지정학·삼각외교',theory:'mercantilism',tc:'m',
   summary:'소련 견제를 위해 적국 중국과 손잡다 — 안보와 경제가 결합된 패권 전략의 정수',
   bg:'1972년 2월, 닉슨 대통령이 공산주의 중국을 전격 방문했습니다. 1949년 중화인민공화국 수립 이후 미국이 23년간 단교 상태를 유지하다 갑자기 화해 제스처를 취한 것입니다. 이것이 헨리 키신저가 설계한 삼각외교(Triangular Diplomacy)입니다.',
   content:`삼각외교의 구조와 논리:

미국-중국-소련의 전략적 삼각형:
소련이 가장 강력한 경쟁자인 상황에서, 미국은 중국과의 관계 개선으로 소련을 양면에서 압박하려 했습니다. "적의 적은 친구"라는 현실주의(중상주의) 논리입니다. 중국도 1969년 소련과 국경 분쟁(진바오 섬)을 겪은 후 소련을 더 큰 위협으로 봤습니다.

경제적 동기:
중국 시장 개방의 기대도 있었습니다. 1979년 덩샤오핑이 미국을 방문하고 보잉사를 직접 시찰하면서 "개혁·개방"을 선언했습니다. 이것이 미국 자본·기술과 중국 노동력의 결합이 시작된 순간입니다. 40년 후 "China Shock"의 씨앗이 여기서 뿌려졌습니다.

IPE적 의미:
교재 Ch.17이 말하는 삼각외교(국가-기업-국가)의 국가 간 버전. 순수한 경제 논리가 아니라 안보·지정학 목표가 경제 관계를 결정한다는 중상주의 명제의 실증입니다.`,
   result:'닉슨-중국 화해는 냉전 구조를 재편했습니다. 단기적으로 소련을 견제하는 데 성공했지만, 장기적으로 중국을 세계 경제에 통합시켜 미국의 가장 강력한 경쟁자로 키우는 결과를 낳았습니다. Friedberg(3주차 2강): "관여 정책(Engagement Policy)의 전제 — 경제 통합이 중국을 민주화시킬 것이라는 믿음 — 이 틀렸음이 밝혀졌다."',
   c1:{n:'경제적 자유주의',c:'자유주의자들은 닉슨의 중국 접근을 긍정적으로 평가합니다. 무역과 경제 통합이 평화를 증진하고 결국 민주화로 이어질 것이라는 자유주의적 평화론(liberal peace theory)의 실험이었습니다. 단기적으로 미중 경제 교류는 양측 모두에게 절대적 이익을 가져다줬습니다. 문제는 중국이 기대했던 방향으로 변화하지 않은 것이지, 관여 정책 자체의 문제는 아닙니다.'},
   c2:{n:'구조주의',c:'구조주의는 닉슨-키신저의 삼각외교를 미국 자본 계급의 이익 관철로 봅니다. 중국 시장 개방으로 가장 큰 이익을 얻은 것은 저임금 생산지를 찾던 미국 TNC들이었습니다. 중국 노동자들이 공장에서 일해 만든 이윤이 미국 주주들에게 흘러갔습니다. "지정학적 결정"으로 포장됐지만 자본가 계급의 이익이 그 핵심에 있었습니다.'}
  },

  {id:'tl-038',year:'1974',yn:1974,loc:'유엔',
   title:'G77의 신국제경제질서(NIEO) 요구',
   tag:'남북갈등·구조변혁',theory:'structuralism',tc:'s',
   summary:'77개 개도국의 연대 — "현재의 자유무역 질서는 우리를 착취하는 구조다, 근본부터 바꿔라"',
   bg:'1974년 유엔 총회에서 77개 개도국 그룹(G77)이 신국제경제질서(NIEO) 수립을 위한 선언을 통과시켰습니다. 1973년 OPEC의 오일쇼크로 산유국들이 원자재 가격 통제에 성공하자, 다른 개도국들도 현재의 국제 경제 질서가 자신들에게 구조적으로 불리하다고 선언하며 전면적 개혁을 요구했습니다.',
   content:`NIEO의 핵심 요구사항:

① 자원 주권(Permanent Sovereignty over Natural Resources):
개도국이 자국의 천연자원과 경제 활동에 대해 완전한 통제권을 가져야 합니다. 외국 TNC가 수익을 본국으로 유출하는 것을 규제할 권리를 인정해야 합니다.

② 교역조건(Terms of Trade) 개선:
원자재 가격이 공산품 가격에 비해 지속적으로 하락하는 구조("프레비시-싱어 명제")를 시정해야 합니다. 같은 양의 원자재를 팔아 살 수 있는 공산품이 계속 줄어드는 불등가교환 구조입니다.

③ TNC 행동 강령:
초국적기업이 개도국에서 어떻게 행동해야 하는지 국제 규범 제정. 이후 교재 Ch.17이 다루는 MAI(다자간 투자협정) 논의의 원형입니다.

④ IMF·세계은행 의사결정 민주화:
출자 비율 기준 투표권으로 선진국이 지배하는 구조 개혁.

왜 실패했나:
미국을 비롯한 선진국들이 전면 거부했습니다. 시스템의 규칙을 바꾸기보다 개도국이 기존 체제에 더 잘 통합되면 혜택을 받을 것이라고 설득했습니다 — 이것이 1990년대 워싱턴 컨센서스의 원형입니다.`,
   result:'NIEO는 실패했지만 개도국 연대와 남북 갈등이라는 의제를 국제 정치경제의 중심으로 끌어올렸습니다. 이후 도하 개발라운드(2001)에서 개도국 G20이 선진국의 농업 보조금 철폐를 요구하며 교착 상태를 만든 것, 브릭스(BRICs) 연대 움직임이 모두 NIEO의 정신적 계승입니다.',
   c1:{n:'경제적 자유주의',c:'자유주의자들은 NIEO가 자유시장 원리를 왜곡할 것이라고 반대했습니다. 원자재 가격 안정화 협정은 수요·공급에 의한 자원 배분을 방해하고 비효율을 낳습니다. 개도국이 발전하려면 자유무역과 외국인 투자를 받아들이는 것이 최선입니다 — 동아시아 수출 주도 성장이 증거입니다.'},
   c2:{n:'중상주의',c:'중상주의는 NIEO의 문제의식에는 공감하지만 방법에 이견을 보입니다. 개도국이 집단행동보다 각자 강력한 국가 주도 산업정책으로 자국 산업을 키우는 것이 더 현실적입니다. 한국·대만이 NIEO가 아니라 발전국가 모델로 성공한 것이 증거입니다.'}
  },

  {id:'tl-039',year:'1982',yn:1982,loc:'프랑스',
   title:'프랑스의 VCR 푸아티에 통관 지연 — 창의적 비관세장벽',
   tag:'비관세장벽',theory:'mercantilism',tc:'m',
   summary:'"행정 절차"를 무기로 쓴 중상주의 — 일본 가전제품 침공을 막기 위한 교과서적 NTB 사례',
   bg:'1982년 일본산 VCR이 유럽 시장을 빠르게 잠식하자, 프랑스 정부는 모든 수입 VCR이 남서부 내륙 소도시 푸아티에(Poitiers)의 단일 세관을 통과하도록 의무화했습니다. 이 세관은 의도적으로 인력을 최소화하여 통관 처리 속도를 극도로 늦췄습니다. 교재 Ch.6이 직접 언급하는 비관세장벽의 전형적 사례입니다.',
   content:`비관세장벽(NTB)의 교과서적 사례:

규모와 효과:
월 수천 개씩 들어오던 일본 VCR 수입이 사실상 수백 개로 급감했습니다. 프랑스 전자업체 Thomson이 일본 경쟁사로부터 시간을 벌 수 있었습니다.

WTO/GATT 규범 회피의 기술:
공식적으로 관세를 올린 것이 아니라 "통관 행정"을 활용했기 때문에 GATT 규범을 직접 위반하지 않았습니다. 비관세장벽이 관세보다 교묘하고 WTO로 규제하기 어려운 이유를 잘 보여줍니다.

교재 Ch.6 직접 인용:
"1982년 프랑스는 모든 수입 비디오카세트녹화기(VCR)가 푸아티에에 위치한 작은 세관을 통과하도록 하게 함으로써 자국 VCR 제조업자들을 보호하고자 했는데, 이 세관이 수입품의 통관을 의도적으로 지체했기 때문이다."

현대적 변형:
오늘날 중국의 기술 표준 요건, 한국의 위생검역 요건, 미국의 "Buy American" 조항 등이 모두 같은 논리의 현대적 변형입니다.`,
   result:'푸아티에 조치는 일본의 강력한 항의와 EC 내부의 비판으로 결국 1983년 EC-일본 간 VCR 수출자율규제(VER) 협정으로 대체됐습니다. 그러나 이 사례는 비관세장벽이 얼마나 창의적으로 활용될 수 있는지를 보여주는 상징적 사례로 IPE 교과서에 계속 등장합니다.',
   c1:{n:'경제적 자유주의',c:'자유주의자들은 이 조치를 GATT 정신의 명백한 위반으로 비판합니다. 비차별(non-discrimination) 원칙을 행정 편의를 빌미로 우회한 것입니다. 호혜와 규칙 기반 무역 질서가 이런 "창의적" 보호주의에 의해 잠식됩니다. 프랑스 소비자들은 더 비싸고 덜 경쟁력 있는 제품을 구매해야 했습니다.'},
   c2:{n:'구조주의',c:'구조주의는 이 사례를 국가가 자국 자본(Thomson)의 이익을 위해 소비자를 희생시킨 것으로 봅니다. 보호를 받은 Thomson은 결국 경쟁력을 갖추지 못하고 1990년대 일본 기업들에 인수됐습니다. "국가 이익"을 위한 보호가 실제로는 특정 자본가의 단기 이익을 위한 것이었음이 드러납니다.'}
  },

  {id:'tl-040',year:'1989',yn:1989,loc:'전 세계',
   title:'공산주의 붕괴 + 브래디 플랜 — 자유주의의 승리?',
   tag:'냉전 종식·부채 해결',theory:'liberalism',tc:'l',
   summary:'베를린 장벽 붕괴와 부채 탕감 — "역사의 종언"을 선언했지만 10년 후 연속 금융위기가 찾아왔다',
   bg:'1989년은 세계사의 분기점이었습니다. 11월 9일 베를린 장벽이 무너지면서 동유럽 공산주의 체제가 도미노처럼 붕괴했습니다. 같은 해 미국 재무장관 니콜라스 브래디(Nicholas Brady)는 1982년부터 시작된 개도국 부채 위기를 해결하기 위한 브래디 플랜을 발표했습니다.',
   content:`두 사건의 IPE적 의미:

① 공산주의 붕괴 — "역사의 종언":
프랜시스 후쿠야마(Francis Fukuyama)는 자유민주주의와 시장경제가 인류 역사의 최종 형태가 됐다는 "역사의 종언(The End of History)"을 선언했습니다.

자유주의의 제도적 팽창:
냉전 종식 이후 IMF·세계은행의 워싱턴 컨센서스가 구 공산권 국가들에게 적용됐습니다. 민영화·자유화·재정 긴축. 러시아의 "충격요법(Shock Therapy)"은 엄청난 혼란과 빈곤을 낳았습니다 — 오늘날 러시아 권위주의 체제의 역사적 배경.

② 브래디 플랜:
1982년부터 누적된 개도국 부채를 할인된 가격의 브래디 채권으로 교환하는 시장 친화적 해결책. 부채 탕감의 조건으로 IMF 구조조정(긴축) 프로그램 수용이 요구됐습니다. 채무국 노동자에게 비용이 전가됐습니다.`,
